<title>WithMe</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBF7E9;--sf:#FFF;--s2:#F4E4B2;--s3:#FDF3D0;
  --bd:rgba(159,143,130,.16);--bd2:rgba(159,143,130,.30);
  --tx:#3d3028;--mu:#9F8F82;--hi:#C8BAB0;
  --ac:#F1CC74;--ac2:#d4a010;
  --sc:#d4880a;--sb:rgba(212,136,10,.11);--st:#7a4e00;
  --tc:#7a6e65;--tb:rgba(122,110,101,.11);--tt:#3d3028;
  --rd:#e57373;--gn:#81c784;
  --r:14px;--r2:22px;
  --sh:0 2px 12px rgba(159,143,130,.12);
  --sh2:0 5px 22px rgba(159,143,130,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;
  background-image:radial-gradient(circle at 15% 10%,rgba(241,204,116,.12),transparent 45%),
                   radial-gradient(circle at 85% 85%,rgba(244,228,178,.14),transparent 45%)}
.app{max-width:500px;margin:0 auto;min-height:100vh}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.hdr{padding:18px 18px 0;position:sticky;top:0;z-index:50;background:rgba(251,247,233,.95);backdrop-filter:blur(14px)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.logo-ic{font-size:26px;animation:float 3s ease-in-out infinite;line-height:1}
.logo-tx{font-size:18px;font-weight:800;color:var(--tx);letter-spacing:-.4px}
.logo-tx em{color:var(--ac2);font-style:normal}
.date-chip{font-size:11px;color:var(--mu);background:var(--sf);padding:5px 12px;border-radius:999px;border:1px solid var(--bd);font-weight:700}
.nav{display:flex;gap:2px;padding:4px;background:var(--sf);border-radius:var(--r2);margin-bottom:13px;box-shadow:var(--sh);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:50px;padding:7px 0;border:none;background:transparent;color:var(--hi);font-size:10px;font-weight:700;cursor:pointer;border-radius:18px;transition:all .2s;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1}
.nb .ni{font-size:18px}
.nb.active{background:var(--ac);color:var(--tx);box-shadow:0 3px 10px rgba(241,204,116,.5)}
.qbar{display:flex;gap:7px;margin-bottom:10px}
.qi{flex:1;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:0 13px;height:44px;color:var(--tx);font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.qi:focus{border-color:var(--ac)}
.qi::placeholder{color:var(--hi);font-weight:500}
.ibtn{width:44px;height:44px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf);color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;flex-shrink:0}
.ibtn:hover{border-color:var(--bd2);transform:scale(1.06)}
.ibtn.ac{background:var(--ac);border-color:var(--ac2);color:var(--tx);box-shadow:0 4px 14px rgba(241,204,116,.45)}
#pv{margin:0 0 10px;padding:10px 14px;background:var(--s2);border-radius:var(--r);font-size:13px;display:none;flex-wrap:wrap;gap:9px;align-items:center;border:1.5px dashed var(--bd2)}
#pv.on{display:flex}
.rb{font-size:10px;color:#7a5e00;background:rgba(241,204,116,.25);border:1px solid rgba(241,204,116,.5);padding:2px 9px;border-radius:999px;font-weight:700}
.sec{padding:0 18px 120px}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;margin-top:4px}
.stl{font-size:11px;font-weight:800;color:var(--hi);letter-spacing:.09em;text-transform:uppercase}
.alc{background:linear-gradient(135deg,rgba(241,204,116,.1),rgba(241,204,116,.05));border:1.5px solid rgba(241,204,116,.35);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;animation:pop .3s ease}
.ali{font-size:20px;flex-shrink:0;margin-top:1px}
.alt{font-size:13px;font-weight:700;margin-bottom:2px}
.als{font-size:11px;color:var(--mu);font-weight:600}
.abal{border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;animation:pop .3s ease}
.abal.student{background:var(--sb);border:1.5px solid rgba(212,136,10,.3)}
.abal.teacher{background:var(--tb);border:1.5px solid rgba(122,110,101,.3)}
.cal{background:var(--sf);border-radius:var(--r2);padding:16px;margin-bottom:14px;box-shadow:var(--sh2);border:1px solid var(--bd)}
.cnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cnb{background:var(--s2);border:1px solid var(--bd);color:var(--mu);font-size:16px;cursor:pointer;padding:5px 12px;border-radius:999px;font-family:'Nunito',sans-serif;font-weight:700;transition:all .15s}
.cnb:hover{color:var(--ac2)}
.cml{font-size:15px;font-weight:800}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cdw{text-align:center;font-size:10px;color:var(--hi);font-weight:800;padding:2px 0}
.cgr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;gap:2px;transition:all .15s;position:relative}
.cd:hover{background:var(--s2);transform:scale(1.08)}
.cd.tod{background:var(--ac);color:var(--tx);font-weight:800;box-shadow:0 3px 10px rgba(241,204,116,.4)}
.cd .dr{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:26px}
.cd .d{width:4px;height:4px;border-radius:50%}
.cd .am{position:absolute;top:2px;right:2px;font-size:7px;line-height:1}
.wnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.wl{font-size:14px;font-weight:800}
.wgr{display:flex;flex-direction:column;gap:8px}
.wr{display:flex;gap:10px;align-items:flex-start}
.wdl{width:36px;flex-shrink:0;text-align:center}
.wdn{font-size:9px;color:var(--hi);font-weight:800;text-transform:uppercase}
.wdd{font-size:18px;font-weight:800;line-height:1.1}
.wdd.tod{color:var(--ac2)}
.we{flex:1;display:flex;flex-direction:column;gap:3px;min-height:32px;border-left:2px solid var(--bd);padding-left:10px}
.wev{padding:7px 11px;border-radius:10px;font-size:12px;font-weight:700;border-left:3px solid transparent;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s}
.wev:hover{transform:translateX(2px)}
.wem{font-size:11px;color:var(--hi);padding:6px 10px;font-weight:600}
.evl{display:flex;flex-direction:column;gap:8px}
.evc{background:var(--sf);border-radius:var(--r);padding:14px 16px;border-left:4px solid var(--hi);transition:all .2s;box-shadow:var(--sh);border:1px solid var(--bd);border-left-width:4px}
.evc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.evc.dn{opacity:.4;filter:grayscale(.4)}
.evc.abs-s{border-left-color:var(--sc)!important;background:linear-gradient(135deg,rgba(212,136,10,.04),var(--sf))}
.evc.abs-t{border-left-color:var(--tc)!important;background:linear-gradient(135deg,rgba(122,110,101,.04),var(--sf))}
.evh{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.evi{font-size:18px;flex-shrink:0}
.evt{font-size:14px;font-weight:700;flex:1}
.evd{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);font-weight:500}
.tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px}
.evn{font-size:12px;color:var(--mu);margin-top:5px;line-height:1.6;font-weight:600;padding:7px 10px;background:var(--s2);border-radius:8px;white-space:pre-wrap}
.rr{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.rc{font-size:10px;padding:3px 9px;border-radius:999px;background:var(--s2);color:var(--mu);border:1px solid var(--bd);font-weight:700}
.eva{display:flex;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);flex-wrap:wrap}
.eab{padding:5px 11px;border-radius:999px;border:1.5px solid var(--bd);background:transparent;color:var(--mu);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.eab:hover{border-color:var(--bd2);color:var(--tx);background:var(--s2)}
.eab.danger:hover{color:#b71c1c;border-color:var(--rd)}
.eab.ok:hover{color:#1b5e20;border-color:var(--gn)}
.eab.mdb{color:var(--st);border-color:rgba(212,136,10,.3)}
.eab.mdb:hover{background:var(--sb)}
.msep{font-size:11px;font-weight:800;color:var(--hi);padding:14px 0 6px;display:flex;align-items:center;gap:8px}
.msep::after{content:'';flex:1;height:1px;background:var(--bd)}
.abbl{border-radius:10px;padding:10px 13px;margin-top:8px;font-size:12px;font-weight:600;line-height:1.7}
.abbl.student{background:var(--sb);border-left:3px solid var(--sc)}
.abbl.teacher{background:var(--tb);border-left:3px solid var(--tc)}
.abbt{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.abbl.student .abbt{color:var(--st)}
.abbl.teacher .abbt{color:var(--tt)}
.abbr2{display:flex;gap:8px;align-items:baseline;margin-bottom:3px}
.abl2{font-size:10px;color:var(--mu);min-width:52px;flex-shrink:0}
.abbv{font-size:12px;font-weight:700;color:var(--tx)}
.mkb{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:800;margin-top:4px}
.mkb.pd{background:rgba(241,204,116,.2);color:#7a5e00;border:1px solid rgba(241,204,116,.45)}
.mkb.dn2{background:rgba(129,199,132,.2);color:#1b5e20;border:1px solid rgba(129,199,132,.4)}
.abst{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.absc{background:var(--sf);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh);border:1px solid var(--bd)}
.absc.student{border-left:4px solid var(--sc)}
.absc.teacher{border-left:4px solid var(--tc)}
.absn{font-size:26px;font-weight:800;margin-bottom:2px}
.absn.student{color:var(--sc)}
.absn.teacher{color:var(--tc)}
.absl{font-size:11px;color:var(--mu);font-weight:600}
.abss{font-size:10px;color:var(--hi);font-weight:600;margin-top:2px}
.afb{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.af{padding:6px 14px;border-radius:999px;border:1.5px solid var(--bd);background:var(--s2);color:var(--mu);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.af:hover{border-color:var(--bd2)}
.af.aa{background:var(--ac);color:var(--tx);border-color:var(--ac2)}
.af.as{background:var(--sc);color:#fff;border-color:var(--sc)}
.af.at{background:var(--tc);color:#fff;border-color:var(--tc)}
.af.ap{background:rgba(241,204,116,.5);color:#7a5e00;border-color:var(--ac)}
.msum{background:var(--tb);border:1.5px solid var(--tc);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.msum-hd{font-size:12px;font-weight:800;color:var(--tt);margin-bottom:12px}
.msum-row{padding:9px 0;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px}
.msum-row:last-child{border:none;padding-bottom:0}
.ri{font-size:13px;color:var(--mu);margin-bottom:16px;line-height:1.7;padding:13px 15px;background:var(--sf);border-radius:var(--r);border-left:4px solid var(--ac);font-weight:600;box-shadow:var(--sh)}
.rform{background:var(--sf);border-radius:var(--r2);padding:18px;margin-bottom:16px;box-shadow:var(--sh2);border:1px solid var(--bd)}
.rf{margin-bottom:12px}
.rf label{display:block;font-size:10px;color:var(--mu);font-weight:800;letter-spacing:.07em;margin-bottom:6px;text-transform:uppercase}
.rf input,.rf textarea{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r);padding:10px 13px;color:var(--tx);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.rf input:focus,.rf textarea:focus{border-color:var(--ac)}
.rf textarea{resize:none;height:58px;line-height:1.5}
.tg{display:flex;gap:6px;flex-wrap:wrap}
.tb2{padding:6px 13px;border-radius:999px;border:1.5px solid var(--bd);background:var(--s2);color:var(--mu);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.tb2.on{background:var(--ac);border-color:var(--ac2);color:var(--tx)}
.arb{width:100%;height:42px;background:var(--ac);color:var(--tx);border:none;border-radius:var(--r);font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px;box-shadow:0 4px 14px rgba(241,204,116,.4);transition:opacity .15s}
.arb:hover{opacity:.85}
.rcard{background:var(--sf);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;border-left:4px solid var(--ac);display:flex;gap:12px;align-items:flex-start;box-shadow:var(--sh);border:1px solid var(--bd);border-left-width:4px}
.rcard.bi{border-left-color:var(--hi)}
.rb2{flex:1}
.rkw{font-size:14px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.rmeta{font-size:11px;color:var(--mu);font-weight:600;line-height:1.8}
.rnp{font-size:11px;color:var(--mu);font-style:italic;margin-top:3px;font-weight:600}
.rdl{background:none;border:none;color:var(--hi);font-size:20px;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.rdl:hover{color:var(--rd)}
.btag{font-size:9px;padding:2px 6px;border-radius:5px;background:var(--s2);color:var(--hi);font-weight:700;border:1px solid var(--bd)}
.mbg{position:fixed;inset:0;background:rgba(61,48,40,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(7px)}
.modal{background:var(--bg);border-radius:28px 28px 0 0;padding:24px 20px 44px;width:100%;max-width:500px;animation:up .24s cubic-bezier(.34,1.56,.64,1);max-height:92vh;overflow-y:auto}
.mttl{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.mcls{background:var(--s2);border:none;color:var(--mu);font-size:18px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;color:var(--mu);font-weight:800;letter-spacing:.07em;margin-bottom:6px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;min-width:0;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:10px 13px;color:var(--tx);font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ac)}
.field textarea{resize:none;height:70px;line-height:1.5}
.fr{display:flex;gap:10px;min-width:0}
.fr .field{flex:1;min-width:0}
.cpills{display:flex;gap:6px;flex-wrap:wrap}
.cpill{padding:7px 13px;border-radius:999px;border:1.5px solid var(--bd);background:var(--s2);color:var(--mu);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.rpills{display:flex;gap:6px;flex-wrap:wrap}
.rpb{padding:6px 13px;border-radius:999px;border:1.5px solid var(--bd);background:var(--s2);color:var(--mu);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.rpb.on{background:var(--ac);border-color:var(--ac2);color:var(--tx)}
.afsec{background:var(--s2);border-radius:var(--r);padding:14px;margin-bottom:13px;border:1.5px dashed var(--bd2)}
.afsec.ss{border-color:rgba(212,136,10,.3);background:rgba(212,136,10,.05)}
.afsec.ts{border-color:rgba(122,110,101,.3);background:rgba(122,110,101,.05)}
.afstl{font-size:12px;font-weight:800;margin-bottom:12px}
.afstl.student{color:var(--st)}
.afstl.teacher{color:var(--tt)}
.sbtn{width:100%;height:48px;background:var(--ac);color:var(--tx);border:none;border-radius:var(--r);font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 16px rgba(241,204,116,.4);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.sbtn:hover{opacity:.87}
.sbtn.sb{background:var(--sb);color:var(--st);border:2px solid var(--sc);box-shadow:none}
.sbtn.tb{background:var(--tb);color:var(--tt);border:2px solid var(--tc);box-shadow:none}
.uz{border:2px dashed var(--bd2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:12px;background:var(--s2)}
.uz:hover{border-color:var(--ac)}
.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uhi{font-size:13px;color:var(--mu);line-height:1.7;font-weight:600}
.apirow{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.apii{flex:1;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:9px 12px;color:var(--tx);font-size:12px;font-family:'DM Mono',monospace;outline:none}
.apii:focus{border-color:var(--ac)}
.apik{font-size:12px;color:#2e7d32;font-weight:700;flex-shrink:0}
.spin{width:28px;height:28px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.ait{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--bd)}
.ait:last-child{border:none}
.aic{width:18px;height:18px;cursor:pointer;accent-color:var(--ac);flex-shrink:0;margin-top:2px}
.smb{background:rgba(241,204,116,.12);border:1.5px solid rgba(241,204,116,.35);border-radius:var(--r);padding:10px 14px;font-size:12px;color:#7a5e00;margin-bottom:12px;line-height:1.6;font-weight:700}
.fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:468px;z-index:40;display:flex;gap:8px}
.fabm{flex:1;height:52px;background:var(--ac);border:none;border-radius:var(--r2);color:var(--tx);font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 6px 22px rgba(241,204,116,.5);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.fabm:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(241,204,116,.6)}
.fabs{width:52px;height:52px;border:2px solid var(--bd2);border-radius:var(--r2);font-size:24px;cursor:pointer;background:var(--sf);box-shadow:var(--sh2);transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fabs:hover{transform:translateY(-2px);background:var(--s2)}
.fabs.s{border-color:var(--sc)}
.fabs.t{border-color:var(--tc)}
.empty{text-align:center;padding:36px 20px;color:var(--hi)}
.ea{font-size:52px;display:block;margin:0 auto 10px;animation:float 3s ease-in-out infinite}
.em{font-size:14px;font-weight:700;color:var(--mu);margin-bottom:4px}
.es{font-size:12px;font-weight:600}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--sf);border:1.5px solid rgba(241,204,116,.5);color:#7a5e00;padding:10px 18px;border-radius:999px;font-size:12px;font-weight:700;z-index:200;max-width:340px;text-align:center;box-shadow:var(--sh2);white-space:nowrap;pointer-events:none}
/* ICON PICKER */
.ip-sec{font-size:10px;font-weight:800;color:var(--hi);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.ip-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px}
.ip-c{font-size:26px;text-align:center;cursor:pointer;border-radius:10px;padding:7px 4px;border:2px solid transparent;transition:all .15s;line-height:1}
.ip-c:hover{background:var(--s2);transform:scale(1.12)}
.ip-c.picked{border-color:var(--ac2);background:var(--s2)}
/* ICON CUSTOMIZER GRID */
.ic-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ic-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 12px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--s2);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;font-size:11px;font-weight:700;color:var(--mu)}
.ic-btn:hover{border-color:var(--bd2);background:var(--s3)}
.ic-btn .ic-em{font-size:22px}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-top">
    <div class="logo" onclick="openPicker('logo')" title="點擊換圖示">
      <div class="logo-ic" id="ic-logo">🐰</div>

  </div>
  <div id="pv"></div>
</div>
<div class="sec" id="main-section"></div>
</div>

<div class="fab">
  <button class="fabs s" id="fab-s" onclick="openAbsModal('student')" title="學生請假">📝</button>
  <button class="fabm" onclick="openAdd()"><span id="ic-fabm">✨</span> 新增事件</button>
  <button class="fabs t" id="fab-t" onclick="openAbsModal('teacher')" title="老師請假">🏫</button>
</div>

<!-- ADD MODAL -->
<div class="mbg" id="add-modal" style="display:none" onclick="if(event.target===this)closeAdd()">
<div class="modal">
  <div class="mttl"><span><span id="modal-icon">✨</span> <span id="modal-ttl">新增事件</span></span><button class="mcls" onclick="closeAdd()">×</button></div>
  <div class="field"><label>📌 標題</label><input id="f-title" placeholder="事件名稱…"/></div>
  <div class="fr">
    <div class="field"><label>📅 日期</label><input id="f-date" type="date"/></div>
    <div class="field"><label>⏰ 時間</label><input id="f-time" type="time"/></div>
  </div>
  <div class="field"><label>🏷️ 分類</label><div class="cpills" id="cat-pills"></div></div>
  <div class="field"><label>🔔 提醒</label><div class="rpills" id="rem-pills"></div></div>
  <div class="field"><label>📝 備注</label><textarea id="f-note" placeholder="備注…"></textarea></div>
  <button class="sbtn" onclick="saveEvent()">💾 儲存</button>
</div>
</div>

<!-- ABS MODAL -->
<div class="mbg" id="abs-modal" style="display:none" onclick="if(event.target===this)closeAbsModal()">
<div class="modal" id="abs-modal-inner"></div>
</div>

<!-- UPLOAD MODAL -->
<div class="mbg" id="upload-modal" style="display:none" onclick="if(event.target===this)closeUpload()">
<div class="modal">
  <div class="mttl"><span>🤖 AI 讀取檔案</span><button class="mcls" onclick="closeUpload()">×</button></div>
  <div class="apirow">
    <input type="password" class="apii" id="api-key" placeholder="Anthropic API Key（sk-ant-...）"/>
    <button onclick="saveKey()" style="padding:7px 14px;border:1.5px solid var(--bd);border-radius:999px;background:var(--s2);color:var(--mu);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif">儲存</button>
    <span class="apik" id="key-status"></span>
  </div>
  <div id="upload-body"></div>
</div>
</div>

<!-- ICON PICKER MODAL -->
<div class="mbg" id="picker-modal" style="display:none" onclick="if(event.target===this)closePicker()">
<div class="modal">
  <div class="mttl"><span>🎨 選擇圖示 — <span id="picker-lbl" style="color:var(--mu);font-size:14px"></span></span><button class="mcls" onclick="closePicker()">×</button></div>
  <div id="picker-body"></div>
</div>
</div>

<script>
// ═══ ICON SYSTEM ══════════════════════════
const EMOJI_SETS=[
  {label:'動物',icons:['🐰','🐻','🐼','🐨','🐱','🐶','🐸','🐵','🦊','🐯','🦁','🐮','🐷','🐔','🐧','🐦','🦆','🦉','🦋','🐌','🐛','🐝','🐠','🐳','🐬','🦀','🦞','🐢','🦎','🦖']},
  {label:'植物花朵',icons:['🌸','🌺','🌻','🌹','🌷','🍀','🌿','🍃','🌱','🌲','🌳','🍄','🌴','🎋','🎍','🌾','🍁','🍂','🌵','🌊']},
  {label:'食物',icons:['🍰','🎂','🍩','🍪','🍫','🍭','🍬','🍡','🍓','🍇','🍊','🍋','🍒','🍑','🍔','🍕','🌮','🧇','☕','🧋','🍵','🧁','🥐','🍦','🍧','🍨']},
  {label:'物品',icons:['⭐','💫','✨','🎯','🎀','🎁','🎈','🎉','🏆','🥇','💎','🔮','📚','📖','✏️','📝','📌','🔔','📅','🗓️','⏰','📱','💡','🔑','🎪','🎠','🎡','🎢']},
  {label:'天氣自然',icons:['☀️','🌙','⭐','🌈','❄️','🔥','💧','🌊','⚡','🌪️','🌤️','⛅','🌥️','🌦️','🌧️','⛈️','🌩️','🌨️','🌫️','🌬️']},
  {label:'表情符號',icons:['😊','😄','🥰','😍','🤩','😎','🤗','😇','🥳','😋','😜','🤪','😏','😌','🥺','🤭','😴','🤔','☺️','🙂','😀','😃','🤓','😺','😸','😻','🐱','🐶']},
  {label:'符號',icons:['💖','💕','💗','💓','💞','💝','🌟','💫','✨','🌈','🎯','🏫','🏠','🏥','📋','📊','💼','🎒','🧳','🔧','⚙️','🛠️','🔬','🎓','📐','📏','🖊️','🖋️','📮','📯']},
];

const TARGETS={
  logo:     {id:'ic-logo',  key:'ic_logo',  def:'🐰', lbl:'App 圖示'},
  today:    {id:'ic-today', key:'ic_today', def:'☀️', lbl:'今日 Tab'},
  week:     {id:'ic-week',  key:'ic_week',  def:'📋', lbl:'本週 Tab'},
  month:    {id:'ic-month', key:'ic_month', def:'🗓️', lbl:'月曆 Tab'},
  all:      {id:'ic-all',   key:'ic_all',   def:'📚', lbl:'全部 Tab'},
  abs:      {id:'ic-abs',   key:'ic_abs',   def:'🏥', lbl:'請假 Tab'},
  rules:    {id:'ic-rules', key:'ic_rules', def:'⚡', lbl:'規則 Tab'},
  fabm:     {id:'ic-fabm',  key:'ic_fabm',  def:'✨', lbl:'新增按鈕'},
  fabs:     {id:'fab-s',    key:'ic_fabs',  def:'📝', lbl:'學生請假按鈕'},
  fabt:     {id:'fab-t',    key:'ic_fabt',  def:'🏫', lbl:'老師請假按鈕'},
  cat_work: {key:'ic_cwork',def:'💼', lbl:'工作分類'},
  cat_meet: {key:'ic_cmeet',def:'🤝', lbl:'座談分類'},
  cat_ev:   {key:'ic_cev',  def:'🎉', lbl:'活動分類'},
  cat_dead: {key:'ic_cdead',def:'⏳', lbl:'截止分類'},
  cat_oth:  {key:'ic_coth', def:'📌', lbl:'其他分類'},
};

function gi(key){return localStorage.getItem(key)||Object.values(TARGETS).find(t=>t.key===key)?.def||'⭐';}

function loadIcons(){
  Object.entries(TARGETS).forEach(([,cfg])=>{
    if(!cfg.id)return;
    const el=document.getElementById(cfg.id);
    if(el)el.textContent=gi(cfg.key);
  });
}

let _pTarget=null;
function openPicker(tid){
  _pTarget=tid;
  const cfg=TARGETS[tid];
  const cur=gi(cfg.key);
  document.getElementById('picker-lbl').textContent=cfg.lbl;
  let html='';
  EMOJI_SETS.forEach(set=>{
    html+=`<div class="ip-sec">${set.label}</div><div class="ip-grid">`;
    html+=set.icons.map(e=>`<div class="ip-c${e===cur?' picked':''}" onclick="pickIcon('${e}')">${e}</div>`).join('');
    html+='</div>';
  });
  document.getElementById('picker-body').innerHTML=html;
  document.getElementById('picker-modal').style.display='flex';
}
function closePicker(){document.getElementById('picker-modal').style.display='none';_pTarget=null;}
function pickIcon(ic){
  if(!_pTarget)return;
  const cfg=TARGETS[_pTarget];
  localStorage.setItem(cfg.key,ic);
  if(cfg.id){const el=document.getElementById(cfg.id);if(el)el.textContent=ic;}
  // Update CATS if category
  const catMap={cat_work:'work',cat_meet:'meeting',cat_ev:'event',cat_dead:'deadline',cat_oth:'other'};
  if(catMap[_pTarget]&&CATS[catMap[_pTarget]]){CATS[catMap[_pTarget]].icon=ic;render();}
  closePicker();
  toast('✅ 圖示已更新！');
}

// ═══ CONFIG ════════════════════════════════
const CATS={
  work:    {label:'工作',  icon:gi('ic_cwork'), color:'#5ab4d6',bg:'rgba(90,180,214,.13)', tc:'#1a5a78',remDef:[1]},
  meeting: {label:'座談',  icon:gi('ic_cmeet'), color:'#9c7fd6',bg:'rgba(156,127,214,.13)',tc:'#4a3070',remDef:[7,1]},
  event:   {label:'活動',  icon:gi('ic_cev'),   color:'#6abf78',bg:'rgba(106,191,120,.13)',tc:'#2a6040',remDef:[3,1]},
  deadline:{label:'截止',  icon:gi('ic_cdead'), color:'#e0708a',bg:'rgba(224,112,138,.13)',tc:'#802050',remDef:[7,3,1]},
  other:   {label:'其他',  icon:gi('ic_coth'),  color:'#e0a840',bg:'rgba(224,168,64,.13)', tc:'#7a5010',remDef:[0]},
};
const REMO=[{l:'當天',d:0},{l:'1天前',d:1},{l:'3天前',d:3},{l:'7天前',d:7},{l:'2週前',d:14}];
const DOW=['一','二','三','四','五','六','日'];
const MI=['🎍','🌸','🌼','🌷','🌻','🌞','🌊','🍉','🍂','🎃','🍁','⛄'];
const BR=[
  {id:'b1',kw:'親師座談',cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b2',kw:'PTA',cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b3',kw:'一對一',cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b4',kw:'期中評量',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b5',kw:'期末評量',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b6',kw:'英語競賽',cat:'event',rems:[7,3,1],note:'',builtin:true},
  {id:'b7',kw:'說明會',cat:'meeting',rems:[7,1],note:'',builtin:true},
  {id:'b8',kw:'截止',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b9',kw:'放假',cat:'other',rems:[0],note:'',builtin:true},
];

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lss(k,v){localStorage.setItem(k,JSON.stringify(v));}
let events=ls('wc6_ev',[]),absences=ls('wc6_ab',[]),customRules=ls('wc6_ru',[]);
let editId=null,selRems=[],selCat='work',rfRems=[1],rfCat='work',absF='all',currentView='today',editAbsId=null;
const today=new Date();today.setHours(0,0,0,0);
let calY=today.getFullYear(),calM=today.getMonth();
let wkS=(()=>{const d=new Date(today);d.setDate(today.getDate()-(today.getDay()||7)+1);return d;})();
function saveEv(){lss('wc6_ev',events);}
function saveAbs(){lss('wc6_ab',absences);}
function saveRu(){lss('wc6_ru',customRules);}
function fD(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function fS(iso){if(!iso)return'';const[,m,d]=iso.split('-');return`${+m}/${+d}`;}
function aD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function iTd(){return fD(today);}
function allR(){return[...customRules,...BR];}
function mR(t){for(const r of allR())if(t.includes(r.kw))return r;return null;}

document.getElementById('date-chip').textContent=today.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});

// QUICK INPUT
document.getElementById('qtxt').addEventListener('input',function(){showPV(this.value);});
document.getElementById('qtxt').addEventListener('keydown',e=>{if(e.key==='Enter')quickAdd();});
function parseQ(raw){
  let date=null;const yr=today.getFullYear();
  const m=raw.match(/(\d{1,2})\/(\d{1,2})/);
  if(m)date=`${yr}-${p2(m[1])}-${p2(m[2])}`;
  if(!date){
    if(/今天/.test(raw))date=iTd();
    if(/明天/.test(raw))date=fD(aD(today,1));
    const wm=raw.match(/週([一二三四五六日天])/);
    if(wm){const W={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};const t=W[wm[1]];let df=t-today.getDay();if(df<=0)df+=7;date=fD(aD(today,df));}
  }
  let time=null;const tm=raw.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
  if(tm&&parseInt(tm[1])<=24){let h=parseInt(tm[1]),mn=parseInt(tm[2]||0);if(tm[3]&&/pm/i.test(tm[3])&&h<12)h+=12;time=`${p2(h)}:${p2(mn)}`;}
  let title=raw.replace(/\d{1,2}\/\d{1,2}/,'').replace(/(\d{1,2})(?::\d{2})?\s*(?:am|pm)?/i,'').replace(/今天|明天|週[一二三四五六日天]/,'').trim()||raw.trim();
  return{title,date,time,rule:mR(title)||mR(raw)};
}
function showPV(raw){

    <span style="font-size:11px;color:var(--mu);font-weight:600">🔔 ${rems.map(r=>r===0?'當天':r+'天前').join('、')}</span>

function quickAdd(){

function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());

// TODAY
function renderToday(){
  const iso=iTd();
  const todEvs=events.filter(e=>e.date===iso&&!e.done);
  const rems=events.filter(e=>{if(!e.date||e.done)return false;const diff=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);return diff>0&&(e.rems||[]).includes(diff);});
  const todAbs=absences.filter(a=>a.date===iso);
  const pendMk=absences.filter(a=>a.type==='student'&&!a.makeupDone&&a.makeup);
  let h='';
  if(todAbs.length){
    h+=`<div class="shd"><span class="stl">🚨 今日請假</span></div>`;
    todAbs.forEach(a=>{const isS=a.type==='student';
      h+=`<div class="abal ${isS?'student':'teacher'}"><div style="font-size:20px">${isS?'📝':'🏫'}</div>
        <div><div class="alt" style="color:${isS?'var(--st)':'var(--tt)'}">${isS?'學生請假':'老師請假'} · ${a.name}</div>
        ${isS&&a.makeup?`<div class="als">📚 ${a.makeup}</div>`:''}
        ${!isS&&a.sub?`<div class="als">👤 代課：${a.sub}</div>`:''}
        ${a.note?`<div class="als">📝 ${a.note}</div>`:''}
        ${isS?`<span class="mkb ${a.makeupDone?'dn2':'pd'}">${a.makeupDone?'✅ 已補課':'⏳ 待補課'}</span>`:''}</div></div>`;
    });
  }
  if(pendMk.length){
    h+=`<div class="shd" style="margin-top:${todAbs.length?14:4}px"><span class="stl">📚 待補進度</span></div>`;
    pendMk.forEach(a=>{
      h+=`<div style="background:var(--sb);border:1.5px solid var(--sc);border-radius:var(--r);padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:13px;font-weight:700;color:var(--st)">📝 ${a.name}</div>
        <div style="font-size:11px;color:var(--mu);font-weight:600;margin-top:2px">${a.makeup} · ${fS(a.date)}</div></div>
        <button class="eab mdb" onclick="markMkDone(${a.id})" style="white-space:nowrap">✅ 已補</button></div>`;
    });
  }
  if(rems.length){
    h+=`<div class="shd" style="margin-top:${(todAbs.length||pendMk.length)?14:4}px"><span class="stl">🔔 今日提醒</span></div>`;
    rems.forEach(ev=>{const c=CATS[ev.cat]||CATS.other;const diff=Math.round((new Date(ev.date+'T00:00:00')-today)/864e5);
      h+=`<div class="alc"><div class="ali">${c.icon}</div><div><div class="alt">${ev.title}</div><div class="als">${diff}天後（${fS(ev.date)}）${ev.note?' · '+ev.note.slice(0,25):''}</div></div></div>`;
    });
  }
  const topN=todAbs.length+pendMk.length+rems.length;
  h+=`<div class="shd" style="margin-top:${topN?16:4}px"><span class="stl">☀️ 今日事件</span></div>`;
  if(!todEvs.length)h+=`<div class="empty"><span class="ea">🌸</span><div class="em">今天沒有事件</div><div class="es">輕鬆的一天！</div></div>`;
  else h+=renderCards(todEvs);
  const up=events.filter(e=>{if(!e.date||e.done)return false;const d=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);return d>0&&d<=7;}).sort((a,b)=>a.date.localeCompare(b.date));
  if(up.length){h+=`<div class="shd" style="margin-top:20px"><span class="stl">📅 未來7天</span></div>`;h+=renderCards(up);}
  return h;

// WEEK
function renderWeek(){
  const end=aD(wkS,6);
  let h=`<div class="wnav"><button class="cnb" onclick="wkP()">‹</button><span class="wl">📋 ${wkS.getMonth()+1}/${wkS.getDate()} – ${end.getMonth()+1}/${end.getDate()}</span><button class="cnb" onclick="wkN()">›</button></div><div class="wgr">`;
  for(let i=0;i<7;i++){
    const d=aD(wkS,i);const iso=fD(d);const isT=iso===iTd();
    const dEvs=events.filter(e=>e.date===iso&&!e.done);
    const dAbs=absences.filter(a=>a.date===iso);
    h+=`<div class="wr"><div class="wdl"><div class="wdn">${DOW[i]}</div><div class="wdd${isT?' tod':''}">${d.getDate()}</div></div><div class="we">`;
    dAbs.forEach(a=>{const isS=a.type==='student';h+=`<div class="wev" style="background:${isS?'var(--sb)':'var(--tb)'};border-left-color:${isS?'var(--sc)':'var(--tc)'}" onclick="openAbsModal(null,${a.id})">${isS?'📝':'🏫'} ${a.name}</div>`;});
    if(!dEvs.length&&!dAbs.length)h+=`<span class="wem">—</span>`;
    dEvs.forEach(ev=>{const c=CATS[ev.cat]||CATS.other;h+=`<div class="wev" style="background:${c.bg};border-left-color:${c.color}" data-id="${ev.id}">${c.icon} ${ev.title}</div>`;});
    h+=`</div></div>`;
  }
  return h+'</div>';
}
function wkP(){wkS=aD(wkS,-7);render();}
function wkN(){wkS=aD(wkS,7);render();}

// MONTH
function renderMonth(){
  const first=(new Date(calY,calM,1).getDay()||7)-1;
  const days=new Date(calY,calM+1,0).getDate();
  let h=`<div class="cal"><div class="cnav"><button class="cnb" onclick="calP()">‹</button><span class="cml">${MI[calM]} ${calY}年${calM+1}月</span><button class="cnb" onclick="calN()">›</button></div>
    <div class="cdow">${DOW.map(d=>`<div class="cdw">${d}</div>`).join('')}</div><div class="cgr">`;
  h+=Array(first).fill('<div></div>').join('');
  for(let d=1;d<=days;d++){
    const iso=`${calY}-${p2(calM+1)}-${p2(d)}`;
    const evs=events.filter(e=>e.date===iso&&!e.done);
    const abs=absences.filter(a=>a.date===iso);
    const isT=iso===iTd();
    const dots=evs.slice(0,4).map(e=>`<div class="d" style="background:${(CATS[e.cat]||CATS.other).color}"></div>`).join('');
    const am=abs.length?abs.map(a=>a.type==='student'?'📝':'🏫').join(''):'';
    h+=`<div class="cd${isT?' tod':''}" onclick="openAdd(null,'${iso}')">
      ${am?`<div class="am">${am}</div>`:''}
      <span>${d}</span>${dots?`<div class="dr">${dots}</div>`:''}
    </div>`;
  }
  h+=`</div></div>`;
  const mo=`${calY}-${p2(calM+1)}`;
  const moEvs=events.filter(e=>e.date?.startsWith(mo)).sort((a,b)=>a.date.localeCompare(b.date));
  const moAbs=absences.filter(a=>a.date?.startsWith(mo)).sort((a,b)=>a.date.localeCompare(b.date));
  if(moAbs.length){h+=`<div class="shd"><span class="stl">🏥 本月請假</span></div>`;h+=moAbs.map(a=>absCard(a)).join('');}
  h+=moEvs.length?`<div class="shd" style="margin-top:${moAbs.length?14:0}px"><span class="stl">📅 本月事件</span></div>`+renderCards(moEvs):`<div class="empty"><span class="ea">${MI[calM]}</span><div class="em">這個月沒有事件</div></div>`;
  return h;
}
function calP(){calM--;if(calM<0){calM=11;calY--;}render();}
function calN(){calM++;if(calM>11){calM=0;calY++;}render();}

  const sorted=[...events].sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));

function buildRFCats(){const el=document.getElementById('rf-cats');if(!el)return;el.innerHTML=Object.entries(CATS).map(([k,v])=>`<button class="tb2${rfCat===k?' on':''}" style="${rfCat===k?`background:${v.bg};border-color:${v.color};color:${v.tc}`:''}" onclick="setRFC('${k}')">${v.icon} ${v.label}</button>`).join('');}
function buildRFRems(){const el=document.getElementById('rf-rems');if(!el)return;el.innerHTML=REMO.map(o=>`<button class="tb2${rfRems.includes(o.d)?' on':''}" onclick="togRFR(${o.d})">${o.l}</button>`).join('');}

function togRFR(d){rfRems=rfRems.includes(d)?rfRems.filter(r=>r!==d):[...rfRems,d];buildRFRems();}
function addCR(){
  const kw=(document.getElementById('rf-kw')?.value||'').trim();
  if(!kw){toast('⚠️ 請輸入關鍵字');return;}
  if(!rfRems.length){toast('⚠️ 請選擇提醒時間');return;}
  customRules.push({id:'c'+Date.now(),kw,cat:rfCat,rems:rfRems,note:(document.getElementById('rf-note')?.value||'').trim(),builtin:false});
  saveRu();rfRems=[1];rfCat='work';toast(`✅ 規則「${kw}」已新增！`);render();
}
function delR(id){customRules=customRules.filter(r=>r.id!==id);saveRu();render();}

// EVENT CARDS
function renderCards(evs){return`<div class="evl">${evs.map(renderCard).join('')}</div>`;}
function renderCard(ev){
  const c=CATS[ev.cat]||CATS.other;
  const rems=(ev.rems||[]).map(r=>r===0?'當天':r+'天前').join('、');
  return`<div class="evc${ev.done?' dn':''}" style="border-left-color:${c.color}">
    <div class="evh"><span class="evi">${c.icon}</span><span class="evt">${ev.title}</span><span class="evd">${fS(ev.date)}${ev.time?' '+ev.time:''}</span></div>
    <span class="tag" style="background:${c.bg};color:${c.tc}">${c.label}</span>
    ${ev.note?`<div class="evn">${ev.note}</div>`:''}
    ${rems?`<div class="rr"><span class="rc">🔔 ${rems}</span></div>`:''}
    <div class="eva">
      <button class="eab ok" onclick="togDone(${ev.id})">${ev.done?'↩️ 恢復':'✅ 完成'}</button>
      <button class="eab" onclick="openAdd(${ev.id})">✏️ 編輯</button>
      <button class="eab danger" onclick="delEv(${ev.id})">🗑️ 刪除</button>
    </div>
  </div>`;
}
function togDone(id){events=events.map(e=>e.id===id?{...e,done:!e.done}:e);saveEv();render();}
function delEv(id){if(!confirm('確定刪除？'))return;events=events.filter(e=>e.id!==id);saveEv();render();}

// ADD/EDIT
function buildCPs(){document.getElementById('cat-pills').innerHTML=Object.entries(CATS).map(([k,v])=>`<button class="cpill${selCat===k?' active':''}" style="${selCat===k?`background:${v.bg};border-color:${v.color};color:${v.tc}`:''}" onclick="setMC('${k}')">${v.icon} ${v.label}</button>`).join('');}
function buildRPs(){document.getElementById('rem-pills').innerHTML=REMO.map(o=>`<button class="rpb${selRems.includes(o.d)?' on':''}" onclick="togMR(${o.d})">${o.l}</button>`).join('');}
function setMC(k){selCat=k;selRems=[...(CATS[k]?.remDef||[1])];buildCPs();buildRPs();}
function togMR(d){selRems=selRems.includes(d)?selRems.filter(r=>r!==d):[...selRems,d];buildRPs();}
function openAdd(id=null,pre=null){
  editId=id;
  if(id){const ev=events.find(e=>e.id===id);document.getElementById('f-title').value=ev.title;document.getElementById('f-date').value=ev.date||'';document.getElementById('f-time').value=ev.time||'';document.getElementById('f-note').value=ev.note||'';selCat=ev.cat;selRems=[...(ev.rems||[])];document.getElementById('modal-ttl').textContent='編輯事件';document.getElementById('modal-icon').textContent='✏️';}
  else{document.getElementById('f-title').value='';document.getElementById('f-date').value=pre||iTd();document.getElementById('f-time').value='';document.getElementById('f-note').value='';selCat='work';selRems=[1];document.getElementById('modal-ttl').textContent='新增事件';document.getElementById('modal-icon').textContent='✨';}
  buildCPs();buildRPs();
  document.getElementById('f-title').oninput=function(){const rule=mR(this.value);if(rule){selCat=rule.cat;selRems=rule.rems;if(rule.note&&!document.getElementById('f-note').value)document.getElementById('f-note').value=rule.note;buildCPs();buildRPs();}};
  document.getElementById('add-modal').style.display='flex';
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}
function closeAdd(){document.getElementById('add-modal').style.display='none';editId=null;}
function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('⚠️ 請填寫標題');return;}
  const ev={id:editId||Date.now(),title,date:document.getElementById('f-date').value||null,time:document.getElementById('f-time').value||null,cat:selCat,rems:selRems,note:document.getElementById('f-note').value.trim(),done:editId?(events.find(e=>e.id===editId)?.done||false):false};
  if(editId)events=events.map(e=>e.id===editId?ev:e);else events.unshift(ev);
  saveEv();closeAdd();render();toast('✅ 已儲存！');
}

// ABSENCE MODAL
function openAbsModal(type,eid=null){
  editAbsId=eid;const ex=eid?absences.find(a=>a.id===eid):null;const t=ex?ex.type:type;const isS=t==='student';
  document.getElementById('abs-modal-inner').innerHTML=`
    <div class="mttl"><span>${isS?'📝 學生請假':'🏫 老師請假'}</span><button class="mcls" onclick="closeAbsModal()">×</button></div>
    <div class="field"><label>${isS?'👤 學生姓名':'👤 老師姓名'}</label>
      <input id="ab-name" placeholder="${isS?'例：小明、B班全體':'例：Rita 老師'}" value="${ex?.name||''}"/></div>
    <div class="fr">
      <div class="field"><label>📅 請假日期</label><input id="ab-date" type="date" value="${ex?.date||iTd()}"/></div>
      <div class="field"><label>📅 至（選填）</label><input id="ab-date2" type="date" value="${ex?.date2||''}"/></div>
    </div>
    <div class="field"><label>📝 請假原因</label><input id="ab-reason" placeholder="例：生病、家事" value="${ex?.reason||''}"/></div>
    ${isS?`<div class="afsec ss"><div class="afstl student">📚 補課安排</div>
      <div class="field" style="margin-bottom:10px"><label>待補進度</label>
        <textarea id="ab-makeup" placeholder="例：Unit 3 Vocab + p.24-26 練習題…">${ex?.makeup||''}</textarea></div>
      <div class="field" style="margin-bottom:0"><label>預計補課日期</label>
        <input id="ab-makeup-date" type="date" value="${ex?.makeupDate||''}"/></div></div>`
    :`<div class="afsec ts"><div class="afstl teacher">👤 代課安排</div>
      <div class="field" style="margin-bottom:10px"><label>代課老師</label>
        <input id="ab-sub" placeholder="例：Polly 老師" value="${ex?.sub||''}"/></div>
      <div class="field" style="margin-bottom:0"><label>代課內容 / 交接事項</label>
        <textarea id="ab-subplan" placeholder="例：B班繼續 Unit 5，CD在抽屜…">${ex?.subplan||''}</textarea></div></div>`}
    <div class="field"><label>📝 其他備注</label>
      <textarea id="ab-note" placeholder="其他備注…">${ex?.note||''}</textarea></div>
    <button class="sbtn ${isS?'sb':'tb'}" onclick="saveAbs2('${t}')">💾 儲存請假紀錄</button>`;
  document.getElementById('abs-modal').style.display='flex';
}
function closeAbsModal(){document.getElementById('abs-modal').style.display='none';editAbsId=null;}
function saveAbs2(type){
  const name=(document.getElementById('ab-name')?.value||'').trim();
  const date=document.getElementById('ab-date')?.value;
  if(!name){toast('⚠️ 請填寫姓名');return;}if(!date){toast('⚠️ 請填寫日期');return;}
  const isS=type==='student';
  const rec={id:editAbsId||Date.now(),type,name,date,date2:document.getElementById('ab-date2')?.value||null,reason:document.getElementById('ab-reason')?.value||'',note:document.getElementById('ab-note')?.value||'',
    ...(isS?{makeup:document.getElementById('ab-makeup')?.value||'',makeupDate:document.getElementById('ab-makeup-date')?.value||null,makeupDone:editAbsId?(absences.find(a=>a.id===editAbsId)?.makeupDone||false):false}
    :{sub:document.getElementById('ab-sub')?.value||'',subplan:document.getElementById('ab-subplan')?.value||'',subConfirmed:editAbsId?(absences.find(a=>a.id===editAbsId)?.subConfirmed||false):false})};
  if(editAbsId)absences=absences.map(a=>a.id===editAbsId?rec:a);else absences.unshift(rec);
  saveAbs();closeAbsModal();render();toast(isS?'📝 學生請假已記錄！':'🏫 老師請假已記錄！');
}

// UPLOAD/AI
function openUpload(){document.getElementById('upload-modal').style.display='flex';resetUB();}
function closeUpload(){document.getElementById('upload-modal').style.display='none';}
function resetUB(){document.getElementById('upload-body').innerHTML=`<div class="uz"><input type="file" id="file-input" accept="image/*,.pdf,.txt,.csv,.xlsx,.docx" onchange="handleFile(this.files[0])"/><div style="font-size:36px;margin-bottom:8px">📎</div><div class="uhi">拖曳或點擊上傳<br><span style="font-size:11px;color:var(--hi)">圖片/PDF/Excel/Word/純文字</span></div></div>`;}
function saveKey(){const k=document.getElementById('api-key').value.trim();if(!k)return;localStorage.setItem('wc6_ak',k);document.getElementById('api-key').value='';document.getElementById('key-status').textContent='✅';document.getElementById('api-key').placeholder='API Key 已儲存';}
(function(){const k=localStorage.getItem('wc6_ak');if(k){document.getElementById('key-status').textContent='✅';document.getElementById('api-key').placeholder='API Key 已儲存';}})();
const EP=`你是行事曆事件擷取助手。找出所有有日期的事件。分類：meeting=親師座談/PTA/說明會，deadline=截止/考試/評量，event=活動/比賽，work=會議，other=其他。提醒：meeting=[7,1]，deadline=[7,3,1]，event=[3,1]，work=[1]，other=[0]。今年${today.getFullYear()}年。只回傳JSON：{"events":[{"title":"","date":"YYYY-MM-DD","time":"HH:MM或null","category":"","note":"","rems":[]}]}`;
async function handleFile(file){
  const key=localStorage.getItem('wc6_ak');if(!key){toast('⚠️ 請先輸入 API Key');return;}
  document.getElementById('upload-body').innerHTML=`<div style="text-align:center;padding:28px"><div class="spin"></div><p style="font-size:13px;color:var(--mu);font-weight:600">🤖 分析中…</p></div>`;
  try{
    let messages;
    if(file.type.startsWith('image/')||file.type==='application/pdf'){const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});messages=[{role:'user',content:[{type:file.type.startsWith('image/')?'image':'document',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:EP}]}];}
    else{messages=[{role:'user',content:`${EP}\n\n${(await file.text()).slice(0,8000)}`}];}
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2000,messages})});
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const parsed=JSON.parse(data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim());
    showAIR(parsed.events||[]);
  }catch(e){document.getElementById('upload-body').innerHTML=`<p style="color:var(--rd);font-size:13px;text-align:center;padding:12px;font-weight:700">❌ ${e.message}</p>`;setTimeout(resetUB,2500);}
}
window._ae=[];
function showAIR(evs){
  if(!evs.length){document.getElementById('upload-body').innerHTML=`<div class="empty"><span class="ea">🔍</span><div class="em">沒有找到事件</div></div>`;setTimeout(resetUB,2000);return;}
  window._ae=evs;
  evs.forEach(ev=>{const r=mR(ev.title);if(r){ev.category=r.cat;ev.rems=r.rems;if(r.note&&!ev.note)ev.note=r.note;}});
  let h=`<div class="smb">⚡ 找到 ${evs.length} 個事件，已套用規則！</div>`;
  h+=evs.map((ev,i)=>{const c=CATS[ev.category]||CATS.other;return`<div class="ait"><input type="checkbox" class="aic" id="aiev${i}" checked/><div><div style="font-size:13px;font-weight:700">${c.icon} ${ev.title}</div><div style="font-size:11px;color:var(--mu);font-weight:600;margin-top:2px">${ev.date||''}${ev.time&&ev.time!='null'?' '+ev.time:''} · <span style="color:${c.color}">${c.label}</span>${ev.rems?' · 🔔 '+ev.rems.map(r=>r===0?'當天':r+'天前').join('、'):''}</div>${ev.note?`<div style="font-size:11px;color:var(--mu);font-style:italic">📝 ${ev.note}</div>`:''}</div></div>`;}).join('');
  h+=`<button class="sbtn" style="margin-top:14px" onclick="importAI()">✨ 匯入勾選的事件</button>`;
  document.getElementById('upload-body').innerHTML=h;
}
function importAI(){
  (window._ae||[]).forEach((ev,i)=>{const cb=document.getElementById('aiev'+i);if(!cb||!cb.checked)return;events.unshift({id:Date.now()+i,title:ev.title,date:ev.date||null,time:(ev.time&&ev.time!=='null')?ev.time:null,cat:ev.category||'other',rems:ev.rems||[0],note:ev.note||'',done:false});});
  saveEv();closeUpload();render();toast('✅ 事件已匯入！');
}

// NOTIFICATIONS
function checkNotifs(){
  if(!('Notification'in window))return;if(Notification.permission==='default')Notification.requestPermission();if(Notification.permission!=='granted')return;
  events.forEach(ev=>{if(!ev.date||ev.done)return;const diff=Math.round((new Date(ev.date+'T00:00:00')-today)/864e5);if((ev.rems||[]).includes(diff)){const key=`n6_${ev.id}_${diff}`;if(!sessionStorage.getItem(key)){new Notification('WithMe 提醒',{body:diff===0?`今天：${ev.title}`:diff===1?`明天：${ev.title}`:`${diff}天後：${ev.title}`});sessionStorage.setItem(key,'1');}}});
  absences.forEach(a=>{if(a.type==='student'&&!a.makeupDone&&a.makeup){const key=`n6ab_${a.id}`;if(!sessionStorage.getItem(key)){new Notification('📝 補課提醒',{body:`${a.name}：${a.makeup.slice(0,40)}`});sessionStorage.setItem(key,'1');}}});
}

// INIT
loadIcons();
render();

// PWA install prompt
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  // Show install button
  const btn=document.createElement('button');
  btn.textContent='📲 安裝為 App';
  btn.style.cssText='position:fixed;top:12px;right:12px;z-index:300;background:var(--ac);color:var(--tx);border:none;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif;box-shadow:0 3px 10px rgba(241,204,116,.5)';
  btn.onclick=()=>{_deferredPrompt.prompt();_deferredPrompt.userChoice.then(()=>btn.remove());};
  document.body.appendChild(btn);
});
</script>
