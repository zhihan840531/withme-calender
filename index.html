<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WithMe">
<meta name="theme-color" content="#F1CC74">
<title>WithMe</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FBF7E9;--sf:#fff;--s2:#F6EFD6;--s3:#F0E4C0;
  --bd:rgba(160,140,100,.18);--bd2:rgba(160,140,100,.32);
  --tx:#3d3028;--mu:#9a8060;--hi:#c0aa88;
  --ac:#F1CC74;--ac2:#c89a10;
  --r:14px;--r2:20px;
  --sh:0 2px 10px rgba(160,130,60,.10);
  --sh2:0 4px 18px rgba(160,130,60,.16);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--tx);
  background-image:
    linear-gradient(var(--bd) 1px,transparent 1px),
    linear-gradient(90deg,var(--bd) 1px,transparent 1px);
  background-size:32px 32px;
}
button{font-family:'Nunito',sans-serif;-webkit-appearance:none;appearance:none;cursor:pointer}
input,textarea,select{font-family:'Nunito',sans-serif;-webkit-appearance:none;appearance:none}
input[type=date],input[type=time]{-webkit-appearance:auto}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}

/* ── HEADER ── */
.hd{background:rgba(251,247,233,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bd);padding:14px 16px 10px;flex-shrink:0;position:relative;z-index:20}
.hd-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo img{width:34px;height:34px;border-radius:10px;object-fit:cover}
.logo-txt{font-size:17px;font-weight:800}
.logo-txt em{font-style:normal;color:var(--ac2)}
.hd-right{margin-left:auto;display:flex;gap:8px}
.hd-icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:var(--sf);
  display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:var(--sh)}

/* NAV */
.nav{display:flex;gap:2px;padding:3px;background:var(--sf);border-radius:16px;box-shadow:var(--sh);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;padding:6px 10px;border:none;background:transparent;color:var(--hi);
  font-size:10px;font-weight:700;border-radius:13px;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:44px}
.nb .ni{font-size:16px;line-height:1}
.nb.on{background:var(--ac);color:var(--tx);box-shadow:0 2px 8px rgba(241,204,116,.45)}

/* QUICK INPUT */
.qwrap{display:flex;gap:8px;margin-top:10px}
.qi{flex:1;height:42px;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);
  padding:0 14px;font-size:14px;font-weight:600;color:var(--tx);outline:none}
.qi:focus{border-color:var(--ac2)}
.qi::placeholder{color:var(--hi)}
.q-btn{width:42px;height:42px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf);
  font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh)}
.q-btn.gold{background:var(--ac);border-color:var(--ac);box-shadow:0 3px 12px rgba(241,204,116,.45)}

/* PREVIEW */
.prev{margin-top:8px;padding:8px 12px;background:var(--s2);border-radius:10px;
  border:1.5px dashed var(--bd2);display:none;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px}
.prev.on{display:flex}
.tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px}

/* ── MAIN SCROLL ── */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 100px}

/* ── GOOGLE CALENDAR ── */
.gcal{background:var(--sf);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh2);border:1px solid var(--bd);margin-bottom:14px}
.gcal-nav{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 8px}
.gcal-lbl{font-size:15px;font-weight:800}
.gcal-nb{background:var(--s2);border:1px solid var(--bd);color:var(--mu);font-size:16px;
  padding:5px 12px;border-radius:999px;font-weight:700}
.gcal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--s2);border-bottom:1px solid var(--bd)}
.gcal-dow-cell{text-align:center;font-size:10px;color:var(--hi);font-weight:800;padding:4px 0}
.gcal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.gcal-cell{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);
  min-height:68px;padding:3px 2px;display:flex;flex-direction:column;gap:2px}
.gcal-cell:nth-child(7n){border-right:none}
.gcal-cell.dim{opacity:.3}
.gcal-num{font-size:11px;font-weight:700;color:var(--mu);text-align:center;line-height:1;margin-bottom:1px}
.gcal-num.sun{color:#e57373}
.gcal-num.tod{background:var(--ac);color:var(--tx);border-radius:50%;width:19px;height:19px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 1px;font-size:11px}
.gcal-pill{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;display:block}
.gcal-more{font-size:9px;color:var(--mu);font-weight:700;padding:0 3px}

/* ── EVENT CARDS ── */
.ev-list{display:flex;flex-direction:column;gap:7px}
.ev-card{background:var(--sf);border-radius:var(--r);padding:12px 14px;
  border-left:4px solid var(--hi);box-shadow:var(--sh);border:1px solid var(--bd);border-left-width:4px}
.ev-head{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.ev-icon{font-size:17px;flex-shrink:0}
.ev-title{font-size:14px;font-weight:700;flex:1}
.ev-date{font-size:11px;color:var(--mu);font-weight:600}
.ev-note{font-size:12px;color:var(--mu);margin-top:4px;line-height:1.5;
  padding:6px 9px;background:var(--s2);border-radius:7px}
.ev-rems{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.ev-rem{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--s2);
  color:var(--mu);border:1px solid var(--bd);font-weight:700}
.ev-acts{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.ev-act{padding:5px 11px;border-radius:999px;border:1.5px solid var(--bd);background:transparent;
  color:var(--mu);font-size:11px;font-weight:700}
.ev-act:hover,.ev-act:active{background:var(--s2)}
.mo-sep{font-size:10px;font-weight:800;color:var(--hi);padding:12px 0 4px;
  display:flex;align-items:center;gap:7px}
.mo-sep::after{content:'';flex:1;height:1px;background:var(--bd)}
.empty{text-align:center;padding:32px 0;color:var(--hi)}
.empty-ic{font-size:44px;display:block;margin-bottom:8px}
.empty-tx{font-size:14px;font-weight:700;color:var(--mu)}

/* ── ALERTS ── */
.alrt{background:rgba(241,204,116,.1);border:1.5px solid rgba(241,204,116,.3);
  border-radius:var(--r);padding:10px 13px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.alrt-ic{font-size:18px;flex-shrink:0}
.alrt-tx{font-size:13px;font-weight:700}
.alrt-sub{font-size:11px;color:var(--mu);margin-top:2px;font-weight:600}

/* ── WEEK ── */
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.wk-lbl{font-size:14px;font-weight:800}
.wk-nb{background:var(--s2);border:1px solid var(--bd);color:var(--mu);font-size:16px;padding:5px 12px;border-radius:999px;font-weight:700}
.wk-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.wk-dl{width:34px;flex-shrink:0;text-align:center}
.wk-dn{font-size:9px;color:var(--hi);font-weight:800;text-transform:uppercase}
.wk-dd{font-size:18px;font-weight:800;line-height:1.1}
.wk-dd.tod{color:var(--ac2)}
.wk-evs{flex:1;border-left:2px solid var(--bd);padding-left:9px;display:flex;flex-direction:column;gap:3px;min-height:28px}
.wk-ev{padding:6px 10px;border-radius:9px;font-size:12px;font-weight:700;
  border-left:3px solid transparent;display:flex;justify-content:space-between}
.wk-emp{font-size:11px;color:var(--hi);padding:4px 0;font-weight:600}

/* ── LEAVE / TODO / BDAY ── */
.lv-card{background:var(--sf);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;
  border-left:4px solid #e57373;box-shadow:var(--sh);border:1px solid var(--bd);border-left-width:4px}
.td-card{background:var(--sf);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;
  display:flex;align-items:flex-start;gap:10px;box-shadow:var(--sh);border:1px solid var(--bd)}
.td-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd2);background:transparent;
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px}
.td-card.done .td-check{background:#81c784;border-color:#81c784;color:#fff}
.td-card.done .td-title{text-decoration:line-through;opacity:.5}
.td-body{flex:1}
.td-title{font-size:14px;font-weight:700}
.td-sub{font-size:11px;color:var(--mu);margin-top:2px;font-weight:600}
.td-del{background:none;border:none;color:var(--hi);font-size:18px;flex-shrink:0}
.bd-card{background:var(--sf);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;
  display:flex;align-items:center;gap:10px;box-shadow:var(--sh);border:1px solid var(--bd)}

/* ── RULES ── */
.rule-intro{font-size:13px;color:var(--mu);padding:11px 13px;background:var(--sf);
  border-radius:var(--r);border-left:4px solid var(--ac);margin-bottom:14px;font-weight:600;
  box-shadow:var(--sh);line-height:1.6}
.rf-card{background:var(--sf);border-radius:var(--r2);padding:16px;margin-bottom:14px;
  box-shadow:var(--sh2);border:1px solid var(--bd)}
.rf-title{font-size:13px;font-weight:800;margin-bottom:12px}
.rf{margin-bottom:11px}
.rf label{display:block;font-size:10px;color:var(--mu);font-weight:800;text-transform:uppercase;margin-bottom:5px;letter-spacing:.05em}
.rf input,.rf textarea{width:100%;background:var(--s2);border:1.5px solid var(--bd);
  border-radius:var(--r);padding:9px 12px;font-size:13px;font-weight:600;color:var(--tx);outline:none}
.rf input:focus,.rf textarea:focus{border-color:var(--ac2)}
.rf textarea{resize:none;height:56px;line-height:1.5}
.tg-group{display:flex;gap:5px;flex-wrap:wrap}
.tg-btn{padding:5px 12px;border-radius:999px;border:1.5px solid var(--bd);background:var(--s2);
  color:var(--mu);font-size:11px;font-weight:700}
.tg-btn.on{background:var(--ac);border-color:var(--ac);color:var(--tx)}
.add-btn{width:100%;height:42px;background:var(--ac);color:var(--tx);border:none;
  border-radius:var(--r);font-size:13px;font-weight:800;margin-top:4px;
  box-shadow:0 3px 12px rgba(241,204,116,.35)}
.rule-card{background:var(--sf);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;
  border-left:4px solid var(--ac);display:flex;gap:11px;box-shadow:var(--sh);border:1px solid var(--bd);border-left-width:4px}
.rule-card.bi{border-left-color:var(--hi)}
.rule-body{flex:1}
.rule-kw{font-size:14px;font-weight:800;margin-bottom:3px}
.rule-meta{font-size:11px;color:var(--mu);font-weight:600;line-height:1.7}
.rule-note{font-size:11px;color:var(--mu);font-style:italic}
.rule-del{background:none;border:none;color:var(--hi);font-size:18px}
.bi-tag{font-size:9px;padding:1px 6px;border-radius:4px;background:var(--s2);color:var(--hi);font-weight:700;border:1px solid var(--bd)}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.sec-title{font-size:11px;font-weight:800;color:var(--hi);text-transform:uppercase;letter-spacing:.08em}
.sec-add{font-size:12px;color:var(--ac2);font-weight:700;border:none;background:none}

/* ── BOTTOM BAR ── */
.bbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:rgba(251,247,233,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--bd);padding:10px 16px 24px;display:flex;gap:8px;z-index:20}
.bb-side{width:48px;height:48px;border-radius:16px;border:1.5px solid var(--bd);background:var(--sf);
  font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);flex-shrink:0}
.bb-main{flex:1;height:48px;background:var(--ac);border:none;border-radius:16px;color:var(--tx);
  font-size:14px;font-weight:800;box-shadow:0 5px 18px rgba(241,204,116,.45);
  display:flex;align-items:center;justify-content:center;gap:7px}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(80,50,10,.48);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.modal{background:var(--bg);border-radius:24px 24px 0 0;padding:20px 18px 40px;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
  animation:slideUp .22s cubic-bezier(.34,1.4,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-title{font-size:16px;font-weight:800;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.m-close{background:var(--s2);border:none;color:var(--mu);width:28px;height:28px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
.m-field{margin-bottom:12px}
.m-field label{display:block;font-size:10px;color:var(--mu);font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.m-field input,.m-field textarea,.m-field select{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-size:14px;font-weight:600;color:var(--tx);outline:none}
.m-field input:focus,.m-field textarea:focus,.m-field select:focus{border-color:var(--ac2)}
.m-field textarea{resize:none;height:68px;line-height:1.5}
.m-field select option{background:var(--sf)}
.m-row{display:flex;gap:9px}.m-row .m-field{flex:1}
.cat-pills{display:flex;gap:5px;flex-wrap:wrap}
.cat-pill{padding:6px 13px;border-radius:999px;border:1.5px solid var(--bd);background:var(--s2);
  color:var(--mu);font-size:12px;font-weight:700}
.rem-pills{display:flex;gap:5px;flex-wrap:wrap}
.rem-pill{padding:5px 12px;border-radius:999px;border:1.5px solid var(--bd);background:var(--s2);
  color:var(--mu);font-size:11px;font-weight:700}
.rem-pill.on{background:var(--ac);border-color:var(--ac);color:var(--tx)}
.m-save{width:100%;height:46px;background:var(--ac);color:var(--tx);border:none;
  border-radius:var(--r);font-size:15px;font-weight:800;margin-top:4px;
  box-shadow:0 4px 14px rgba(241,204,116,.38)}

/* UPLOAD */
.up-zone{border:2px dashed var(--bd2);border-radius:var(--r);padding:24px;text-align:center;
  cursor:pointer;position:relative;margin-bottom:12px;background:var(--s2)}
.up-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.api-row{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.api-in{flex:1;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--tx);outline:none;font-family:monospace}
.api-in:focus{border-color:var(--ac2)}
.api-ok{font-size:12px;color:#2e7d32;font-weight:700;flex-shrink:0}
.spin{width:24px;height:24px;border:3px solid var(--bd2);border-top-color:var(--ac2);
  border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.ai-item{display:flex;gap:9px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--bd)}
.ai-item:last-child{border:none}
.ai-ck{width:17px;height:17px;cursor:pointer;accent-color:var(--ac2);flex-shrink:0;margin-top:2px}
.ai-info{flex:1}
.ai-name{font-size:13px;font-weight:700}
.ai-meta{font-size:11px;color:var(--mu);margin-top:2px;font-weight:600}
.s-banner{background:rgba(241,204,116,.15);border:1.5px solid rgba(241,204,116,.35);
  border-radius:var(--r);padding:8px 12px;font-size:12px;color:#7a5e00;margin-bottom:11px;font-weight:800}

/* FESTIVAL TOGGLE */
.fes-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.fes-row:last-child{border:none}
.fes-lbl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.sw{width:42px;height:23px;border-radius:999px;border:none;position:relative;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--ac)}
.sw.off{background:var(--hi)}
.sw::after{content:'';position:absolute;top:2.5px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sw.on::after{left:21px}
.sw.off::after{left:2.5px}

/* TOAST */
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);
  background:var(--sf);border:1.5px solid rgba(241,204,116,.45);color:#7a5e00;
  padding:9px 18px;border-radius:999px;font-size:12px;font-weight:800;z-index:300;
  white-space:nowrap;box-shadow:var(--sh2);pointer-events:none}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hd">

function gl(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sl(k,v){localStorage.setItem(k,JSON.stringify(v));}

// Migrate old keys
function migrate(){
  const old=['withme_events','wm_events','wc_events','wc2_events','wc3_events'];
  for(const k of old){const v=gl(k,null);if(v&&Array.isArray(v)&&v.length){sl('wm4_ev',v);break;}}
  const old2=['wm_leaves']; for(const k of old2){const v=gl(k,null);if(v&&Array.isArray(v)&&v.length){sl('wm4_lv',v);break;}}
  const old3=['wm_todos'];  for(const k of old3){const v=gl(k,null);if(v&&Array.isArray(v)&&v.length){sl('wm4_td',v);break;}}
  const old4=['wm_bdays'];  for(const k of old4){const v=gl(k,null);if(v&&Array.isArray(v)&&v.length){sl('wm4_bd',v);break;}}
  const old5=['wm_rules','wc2_rules','wc3_rules'];for(const k of old5){const v=gl(k,null);if(v&&Array.isArray(v)&&v.length){sl('wm4_ru',v);break;}}
}

function p2(n){return String(n).padStart(2,'0');}
function fmt(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fd(iso){if(!iso)return'';const[,m,d]=iso.split('-');return `${+m}/${+d}`;}
function iad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function ito(){return fmt(today);}
function allRules(){return[...cRules,...BUILTIN];}
function matchRule(t){for(const r of allRules()){if(t.includes(r.kw))return r;}return null;}
function sv(k,v){sl('wm4_'+k,v);}

// ════════════ QUICK INPUT ════════════
function parseQ(raw){
  let date=null;
  const yr=today.getFullYear();
  const m=raw.match(/(\d{1,2})\/(\d{1,2})/);
  if(m)date=`${yr}-${p2(m[1])}-${p2(m[2])}`;
  if(!date){
    if(/今天/.test(raw))date=ito();
    if(/明天/.test(raw))date=fmt(iad(today,1));
    const wm=raw.match(/週([一二三四五六日天])/);
    if(wm){const wmap={一:1,二:2,三:3,四:4,五:5,六:6,日:0,天:0};const t=wmap[wm[1]];let diff=t-today.getDay();if(diff<=0)diff+=7;date=fmt(iad(today,diff));}
  }
  let title=raw.replace(/(\d{1,2})\/(\d{1,2})/,'').replace(/今天|明天|週[一二三四五六日天]/,'').trim()||raw.trim();
  const rule=matchRule(title)||matchRule(raw);
  return{title,date,rule};
}

function showPrev(raw){
  const box=document.getElementById('prev');
  if(!raw.trim()){box.className='prev';box.innerHTML='';return;}
  const {title,date,rule}=parseQ(raw);
  const cat=rule?rule.cat:'work';const c=CATS[cat];
  const rems=rule?rule.rems:c.rd;
  box.className='prev on';
  box.innerHTML=`<span style="font-size:15px">${c.ic}</span><b style="font-size:13px">${title||'—'}</b>
    <span style="font-size:12px;color:var(--mu)">📅 ${date?fd(date):'未偵測'}</span>
    <span class="tag" style="background:${c.bg};color:${c.tc}">${c.lb}</span>
    <span style="font-size:11px;color:var(--mu)">🔔 ${rems.map(r=>r===0?'當天':r+'天前').join('、')}</span>
    ${rule?`<span style="font-size:10px;font-weight:800;color:var(--ac2)">⚡${rule.kw}</span>`:''}`; 
}

function quickAdd(){
  const raw=document.getElementById('qi').value.trim();if(!raw)return;
  const {title,date,rule}=parseQ(raw);
  const cat=rule?rule.cat:'work';
  events.unshift({id:Date.now(),title,date,time:null,cat,rems:rule?rule.rems:CATS[cat].rd,note:rule?rule.note:'',done:false});
  sv('ev',events);render();
  document.getElementById('qi').value='';
  document.getElementById('prev').className='prev';document.getElementById('prev').innerHTML='';
  if(rule)toast(`⚡ 套用規則「${rule.kw}」`);
}

// ════════════ TAB / RENDER ════════════
function setTab(t,btn){
  curTab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  const m=document.getElementById('main');
  try{
    if(curTab==='today')      m.innerHTML=rToday();
    else if(curTab==='week')  m.innerHTML=rWeek();
    else if(curTab==='month') m.innerHTML=rMonth();
    else if(curTab==='all')   m.innerHTML=rAll();
    else if(curTab==='leave') m.innerHTML=rLeave();
    else if(curTab==='todo')  m.innerHTML=rTodo();
    else if(curTab==='rules') {m.innerHTML=rRules();bRFCats();bRFRems();}
  }catch(e){m.innerHTML=`<div class="empty"><span class="empty-ic">⚠️</span><div class="empty-tx">載入錯誤，請重新整理</div></div>`;console.error(e);}
  // bind week clicks
  document.querySelectorAll('.wk-ev[data-id]').forEach(el=>{
    el.onclick=()=>openAdd(+el.dataset.id);
  });
  checkNotif();
}

// ════════════ VIEWS ════════════
function rToday(){
  const iso=ito();
  const te=events.filter(e=>e.date===iso&&!e.done);
  const remEvs=events.filter(e=>{
    if(!e.date||e.done)return false;
    const diff=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);
    return diff>0&&(e.rems||[]).includes(diff);
  });
  const bdToday=bdays.filter(b=>+b.month===today.getMonth()+1&&+b.day===today.getDate());
  const fesToday=FESTIVALS.filter(f=>f.mo===today.getMonth()+1&&f.dy===today.getDate()&&fesTog[f.id]);
  let h='';
  [...fesToday.map(f=>`<div class="alrt"><div class="alrt-ic">${f.ic}</div><div><div class="alrt-tx">今天是${f.nm}！</div></div></div>`),
   ...bdToday.map(b=>`<div class="alrt"><div class="alrt-ic">🎂</div><div><div class="alrt-tx">🎉 ${b.name} 今天生日！</div>${b.note?`<div class="alrt-sub">${b.note}</div>`:''}</div></div>`),
   ...remEvs.map(ev=>{const c=CATS[ev.cat]||CATS.other;const diff=Math.round((new Date(ev.date+'T00:00:00')-today)/864e5);return`<div class="alrt"><div class="alrt-ic">${c.ic}</div><div><div class="alrt-tx">提醒：${ev.title}</div><div class="alrt-sub">📅 ${diff}天後（${fd(ev.date)}）${ev.note?' · '+ev.note.slice(0,22):''}</div></div></div>`;})
  ].forEach(x=>h+=x);
  h+=`<div class="sec-hd" style="margin-top:${remEvs.length||bdToday.length?14:2}px"><span class="sec-title">☀️ 今日事件</span></div>`;
  h+=te.length?rCards(te):`<div class="empty"><span class="empty-ic">🌸</span><div class="empty-tx">今天沒有事件</div></div>`;
  const up=events.filter(e=>{if(!e.date||e.done)return false;const d=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);return d>0&&d<=7;}).sort((a,b)=>a.date.localeCompare(b.date));
  if(up.length){h+=`<div class="sec-hd" style="margin-top:16px"><span class="sec-title">📅 未來7天</span></div>`;h+=rCards(up);}
  return h;
}

function rWeek(){
  const end=iad(wkStart,6);
  let h=`<div class="wk-nav"><button class="wk-nb" onclick="wprev()">‹</button><span class="wk-lbl">📋 ${wkStart.getMonth()+1}/${wkStart.getDate()} – ${end.getMonth()+1}/${end.getDate()}</span><button class="wk-nb" onclick="wnext()">›</button></div>`;
  for(let i=0;i<7;i++){
    const d=iad(wkStart,i);const iso=fmt(d);const isT=iso===ito();
    const de=events.filter(e=>e.date===iso&&!e.done);
    h+=`<div class="wk-row"><div class="wk-dl"><div class="wk-dn">${DOW[i]}</div><div class="wk-dd${isT?' tod':''}">${d.getDate()}</div></div><div class="wk-evs">`;
    if(!de.length)h+=`<span class="wk-emp">—</span>`;
    else de.forEach(ev=>{const c=CATS[ev.cat]||CATS.other;h+=`<div class="wk-ev" style="background:${c.bg};border-left-color:${c.cl}" data-id="${ev.id}">${c.ic} ${ev.title}</div>`;});
    h+=`</div></div>`;
  }
  return h;
}
function wprev(){wkStart=iad(wkStart,-7);render();}
function wnext(){wkStart=iad(wkStart,7);render();}

function rMonth(){
  const fdow=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const prevD=new Date(calY,calM,0).getDate();
  const todayIso=ito();
  let h=`<div class="gcal"><div class="gcal-nav"><button class="gcal-nb" onclick="calPrev()">‹</button><span class="gcal-lbl">${MI[calM]} ${calY}年${calM+1}月</span><button class="gcal-nb" onclick="calNext()">›</button></div>`;
  h+=`<div class="gcal-dow">${DOW_SUN.map((d,i)=>`<div class="gcal-dow-cell"${i===0?' style="color:#e57373"':''}>${d}</div>`).join('')}</div>`;
  h+=`<div class="gcal-grid">`;
  for(let i=0;i<fdow;i++)h+=`<div class="gcal-cell dim"><div class="gcal-num">${prevD-fdow+1+i}</div></div>`;
  for(let d=1;d<=days;d++){
    const iso=`${calY}-${p2(calM+1)}-${p2(d)}`;
    const dow=new Date(calY,calM,d).getDay();
    const isT=iso===todayIso;const isSun=dow===0;
    const de=events.filter(e=>e.date===iso&&!e.done);
    const bde=bdays.filter(b=>+b.month===calM+1&&+b.day===d);
    const fe=FESTIVALS.filter(f=>f.mo===calM+1&&f.dy===d&&fesTog[f.id]);
    const items=[
      ...fe.map(f=>{return{lb:f.ic+' '+f.nm,bg:'#f8d7e8',tc:'#8a1a4a'}}),
      ...bde.map(b=>{return{lb:'🎂 '+b.name,bg:'#fff0d6',tc:'#7a4000'}}),
      ...de.map(e=>{const c=CATS[e.cat]||CATS.other;return{lb:e.title,bg:c.bg,tc:c.tc,eid:e.id}})
    ];
    const numH=isT?`<div class="gcal-num tod">${d}</div>`:`<div class="gcal-num${isSun?' sun':''}">${d}</div>`;
    const MAX=3;
    let pills=items.slice(0,MAX).map(it=>`<div class="gcal-pill" style="background:${it.bg};color:${it.tc}" onclick="event.stopPropagation();openAdd(null,'${iso}')" title="${it.lb.replace(/"/g,'')}">${it.lb}</div>`).join('');
    if(items.length>MAX)pills+=`<div class="gcal-more">+${items.length-MAX}</div>`;
    h+=`<div class="gcal-cell" onclick="openAdd(null,'${iso}')">${numH}${pills}</div>`;
  }
  const tot=fdow+days;const rem=tot%7;
  if(rem>0)for(let i=1;i<=7-rem;i++)h+=`<div class="gcal-cell dim"><div class="gcal-num">${i}</div></div>`;
  h+=`</div></div>`;
  return h;
}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}render();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}render();}

function rAll(){
  const sorted=[...events].sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
  if(!sorted.length)return`<div class="empty"><span class="empty-ic">📚</span><div class="empty-tx">還沒有任何事件</div></div>`;
  let h='',lm='';
  sorted.forEach(ev=>{
    const mo=ev.date?ev.date.slice(0,7):'';
    if(mo!==lm){const idx=ev.date?parseInt(ev.date.slice(5,7))-1:0;h+=`<div class="mo-sep">${MI[idx]||'📅'} ${ev.date?parseInt(ev.date.slice(5,7))+'月':'無日期'}</div>`;lm=mo;}
    h+=rCard(ev);
  });
  return`<div class="ev-list">${h}</div>`;
}

  if(!leaves.length)return h+`<div class="empty"><span class="empty-ic">🏥</span><div class="empty-tx">沒有請假紀錄</div></div>`;
  [...leaves].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(lv=>{

function rTodo(){
  let h=`<div class="sec-hd"><span class="sec-title">✅ 待辦清單</span><button class="sec-add" onclick="openTodo()">＋ 新增</button></div>`;
  if(!todos.length)return h+`<div class="empty"><span class="empty-ic">✅</span><div class="empty-tx">沒有待辦事項</div></div>`;

  });
  return h;
}

  <div class="rf-card" id="rfcard">

function rRuleCard(r,bi=false){
  const c=CATS[r.cat]||CATS.other;
  return`<div class="rule-card${bi?' bi':''}"><div class="rule-body"><div class="rule-kw">${c.ic} ${r.kw}${bi?'<span class="bi-tag">內建</span>':''}</div><div class="rule-meta"><span class="tag" style="background:${c.bg};color:${c.tc}">${c.lb}</span> · 🔔 ${r.rems.map(x=>x===0?'當天':x+'天前').join('、')}</div>${r.note?`<div class="rule-note">📝 ${r.note.slice(0,42)}${r.note.length>42?'…':''}</div>`:''}</div>${!bi?`<button class="rule-del" onclick="delRule('${r.id}')">🗑️</button>`:''}</div>`;
}
function bRFCats(){
  const el=document.getElementById('rfcats');if(!el)return;
  el.innerHTML=Object.entries(CATS).map(([k,v])=>`<button class="tg-btn${rfCat===k?' on':''}" style="${rfCat===k?`background:${v.bg};border-color:${v.cl};color:${v.tc}`:''} " onclick="setRFC('${k}')">${v.ic} ${v.lb}</button>`).join('');
}
function bRFRems(){
  const el=document.getElementById('rfrems');if(!el)return;
  el.innerHTML=REMS.map(o=>`<button class="tg-btn${rfRems.includes(o.d)?' on':''}" onclick="togRFR(${o.d})">${o.l}</button>`).join('');
}
function setRFC(k){rfCat=k;bRFCats();}
function togRFR(d){rfRems=rfRems.includes(d)?rfRems.filter(r=>r!==d):[...rfRems,d];bRFRems();}
function addRule(){
  const kw=(document.getElementById('rf-kw').value||'').trim();
  if(!kw){toast('⚠️ 請輸入關鍵字');return;}
  if(!rfRems.length){toast('⚠️ 請選擇提醒');return;}
  const note=(document.getElementById('rf-nt').value||'').trim();
  cRules.push({id:'c'+Date.now(),kw,cat:rfCat,rems:rfRems,note,bi:false});
  sv('ru',cRules);rfRems=[1];rfCat='work';toast(`✅ 規則「${kw}」已新增`);render();
}
function delRule(id){cRules=cRules.filter(r=>r.id!==id);sv('ru',cRules);render();}

// ════════════ CARDS ════════════
function rCards(evs){return`<div class="ev-list">${evs.map(rCard).join('')}</div>`;}
function rCard(ev){
  const c=CATS[ev.cat]||CATS.other;
  const rems=(ev.rems||[]).map(r=>r===0?'當天':r+'天前').join('、');
  return`<div class="ev-card${ev.done?' done':''}" style="border-left-color:${c.cl}">
    <div class="ev-head"><span class="ev-icon">${c.ic}</span><span class="ev-title">${ev.title}</span><span class="ev-date">${fd(ev.date)}${ev.time?' '+ev.time:''}</span></div>
    <span class="tag" style="background:${c.bg};color:${c.tc}">${c.lb}</span>
    ${ev.note?`<div class="ev-note">${ev.note}</div>`:''}
    ${rems?`<div class="ev-rems"><span class="ev-rem">🔔 ${rems}</span></div>`:''}
    <div class="ev-acts">
      <button class="ev-act" onclick="togDone(${ev.id})">${ev.done?'↩️ 恢復':'✅ 完成'}</button>
      <button class="ev-act" onclick="openAdd(${ev.id})">✏️ 編輯</button>
      <button class="ev-act" onclick="delEv(${ev.id})">🗑️ 刪除</button>
    </div>
  </div>`;
}
function togDone(id){events=events.map(e=>e.id===id?{...e,done:!e.done}:e);sv('ev',events);render();}
function delEv(id){if(!confirm('確定刪除？'))return;events=events.filter(e=>e.id!==id);sv('ev',events);render();}

// ════════════ ADD/EDIT MODAL ════════════
function bCPills(){
  document.getElementById('cpills').innerHTML=Object.entries(CATS).map(([k,v])=>`<button class="cat-pill${selCat===k?' on':''}" style="${selCat===k?`background:${v.bg};border-color:${v.cl};color:${v.tc}`:''}" onclick="setMC('${k}')">${v.ic} ${v.lb}</button>`).join('');
}
function bRPills(){
  document.getElementById('rpills').innerHTML=REMS.map(o=>`<button class="rem-pill${selRems.includes(o.d)?' on':''}" onclick="togMR(${o.d})">${o.l}</button>`).join('');
}
function setMC(k){selCat=k;selRems=[...(CATS[k]?.rd||[1])];bCPills();bRPills();}
function togMR(d){selRems=selRems.includes(d)?selRems.filter(r=>r!==d):[...selRems,d];bRPills();}

function openAdd(id=null,pd=null,type=null){
  if(type==='leave'){openLeave();return;}
  editId=id;
  if(id){
    const ev=events.find(e=>e.id===id);
    document.getElementById('f-t').value=ev.title;
    document.getElementById('f-d').value=ev.date||'';
    document.getElementById('f-tm').value=ev.time||'';
    document.getElementById('f-n').value=ev.note||'';
    selCat=ev.cat;selRems=[...(ev.rems||[])];
    document.getElementById('m-add-title').textContent='✏️ 編輯事件';
  }else{
    document.getElementById('f-t').value='';
    document.getElementById('f-d').value=pd||ito();
    document.getElementById('f-tm').value='';
    document.getElementById('f-n').value='';
    selCat='work';selRems=[1];
    document.getElementById('m-add-title').textContent='🌟 新增事件';
  }
  bCPills();bRPills();
  document.getElementById('f-t').oninput=function(){
    const rule=matchRule(this.value);
    if(rule){selCat=rule.cat;selRems=rule.rems;if(rule.note&&!document.getElementById('f-n').value)document.getElementById('f-n').value=rule.note;bCPills();bRPills();}
  };
  document.getElementById('m-add').style.display='flex';
  setTimeout(()=>document.getElementById('f-t').focus(),180);
}
function closeAdd(){document.getElementById('m-add').style.display='none';editId=null;}
function saveEvent(){
  const title=document.getElementById('f-t').value.trim();
  if(!title){toast('⚠️ 請填寫標題');return;}
  const ev={id:editId||Date.now(),title,date:document.getElementById('f-d').value||null,time:document.getElementById('f-tm').value||null,cat:selCat,rems:selRems,note:document.getElementById('f-n').value.trim(),done:editId?(events.find(e=>e.id===editId)?.done||false):false};
  if(editId)events=events.map(e=>e.id===editId?ev:e);else events.unshift(ev);
  sv('ev',events);closeAdd();render();toast('✅ 已儲存！');
}

// LEAVE
function openLeave(){document.getElementById('lv-d').value=ito();document.getElementById('m-leave').style.display='flex';}
function closeLeave(){document.getElementById('m-leave').style.display='none';}
function saveLeave(){
  const name=document.getElementById('lv-n').value.trim();if(!name){toast('⚠️ 請填寫姓名');return;}
  leaves.push({id:Date.now(),name,date:document.getElementById('lv-d').value,type:document.getElementById('lv-ty').value,note:document.getElementById('lv-nt').value.trim()});
  sv('lv',leaves);closeLeave();if(curTab==='leave')render();toast('✅ 請假已記錄！');
}
function delLeave(id){if(!confirm('確定刪除？'))return;leaves=leaves.filter(l=>l.id!==id);sv('lv',leaves);render();}

// TODO
function openTodo(){document.getElementById('m-todo').style.display='flex';setTimeout(()=>document.getElementById('td-t').focus(),180);}
function closeTodo(){document.getElementById('m-todo').style.display='none';}
function saveTodo(){
  const title=document.getElementById('td-t').value.trim();if(!title){toast('⚠️ 請填寫內容');return;}
  todos.push({id:Date.now(),title,date:document.getElementById('td-d').value||null,note:document.getElementById('td-n').value.trim(),done:false});
  sv('td',todos);closeTodo();if(curTab==='todo')render();toast('✅ 待辦已新增！');
}
function togTodo(id){todos=todos.map(t=>t.id===id?{...t,done:!t.done}:t);sv('td',todos);render();}
function delTodo(id){todos=todos.filter(t=>t.id!==id);sv('td',todos);render();}

// BDAY
function openBday(){document.getElementById('m-bday').style.display='flex';renderBdays();}
function closeBday(){document.getElementById('m-bday').style.display='none';}
function renderBdays(){
  const el=document.getElementById('bday-list');if(!el)return;
  if(!bdays.length){el.innerHTML=`<div class="empty" style="padding:12px 0"><div class="empty-tx">還沒有生日記錄</div></div>`;return;}
  el.innerHTML=bdays.map(b=>`<div class="bd-card"><span style="font-size:22px">🎂</span><div style="flex:1"><div style="font-size:14px;font-weight:700">${b.name}</div><div style="font-size:11px;color:var(--mu)">${b.month}/${b.day}${b.note?' · '+b.note:''}</div></div><button class="td-del" onclick="delBday(${b.id})">×</button></div>`).join('');
}
function saveBday(){
  const name=document.getElementById('bd-n').value.trim();
  const mo=document.getElementById('bd-m').value;
  const dy=document.getElementById('bd-d').value;
  if(!name||!mo||!dy){toast('⚠️ 請填寫姓名和日期');return;}
  bdays.push({id:Date.now(),name,month:+mo,day:+dy,note:document.getElementById('bd-nt').value.trim()});
  sv('bd',bdays);
  ['bd-n','bd-m','bd-d','bd-nt'].forEach(id=>{document.getElementById(id).value='';});
  renderBdays();toast('🎂 生日已新增！');
}
function delBday(id){bdays=bdays.filter(b=>b.id!==id);sv('bd',bdays);renderBdays();}

// FESTIVAL
function openFes(){
  document.getElementById('m-fes').style.display='flex';
  document.getElementById('fes-list').innerHTML=FESTIVALS.map(f=>`<div class="fes-row"><span class="fes-lbl">${f.ic} ${f.nm} <span style="font-size:11px;color:var(--mu)">${f.mo}/${f.dy}</span></span><button class="sw ${fesTog[f.id]?'on':'off'}" onclick="togFes('${f.id}',this)"></button></div>`).join('');
}
function closeFes(){document.getElementById('m-fes').style.display='none';}
function togFes(id,btn){fesTog[id]=!fesTog[id];btn.className=`sw ${fesTog[id]?'on':'off'}`;sl('wm4_fe',fesTog);}

// ICON PICKER
function openIconPicker(){
  document.getElementById('icon-grid').innerHTML=ICONS.map(ic=>`<button onclick="setLogo('${ic}')" style="font-size:26px;background:none;border:none;padding:8px;border-radius:10px">${ic}</button>`).join('');
  document.getElementById('m-icon').style.display='flex';
}
function closeIconPicker(){document.getElementById('m-icon').style.display='none';}
function setLogo(ic){logoIcon=ic;sl('wm4_lg',ic);const img=document.querySelector('.logo img');if(img){img.src='';img.style.display='none';const span=document.createElement('span');span.style.cssText='font-size:28px;cursor:pointer';span.textContent=ic;span.onclick=openIconPicker;img.parentNode.replaceChild(span,img);}closeIconPicker();}

// UPLOAD
function openUpload(){document.getElementById('m-up').style.display='flex';resetUp();}
function closeUpload(){document.getElementById('m-up').style.display='none';}
function resetUp(){document.getElementById('up-body').innerHTML=`<div class="up-zone"><input type="file" accept="image/*,.pdf,.txt,.csv,.xlsx,.docx" onchange="handleFile(this.files[0])"><span style="font-size:32px;display:block;margin-bottom:8px">📎</span><div style="font-size:13px;color:var(--mu);font-weight:600">拖曳或點擊上傳<br><span style="font-size:11px;color:var(--hi)">圖片 / PDF / Excel / Word / 純文字</span></div></div>`;}
function saveKey(){const k=document.getElementById('api-k').value.trim();if(!k)return;localStorage.setItem('wm4_ak',k);document.getElementById('api-k').value='';document.getElementById('api-k').placeholder='API Key 已儲存';document.getElementById('api-ok').textContent='✅';}
(function(){const k=localStorage.getItem('wm4_ak');if(k){document.getElementById('api-ok').textContent='✅';document.getElementById('api-k').placeholder='API Key 已儲存';}})();

const EP=`找出所有有日期的事件。分類：meeting=親師座談/PTA/說明會，deadline=截止/考試/評量，event=活動/比賽，work=會議，other=其他。提醒：meeting=[7,1]，deadline=[7,3,1]，event=[3,1]，work=[1]，other=[0]。今年${today.getFullYear()}年。只回傳JSON：{"events":[{"title":"","date":"YYYY-MM-DD","time":null,"category":"","note":"","rems":[]}]}`;

async function handleFile(file){
  const key=localStorage.getItem('wm4_ak');if(!key){toast('⚠️ 請先輸入 API Key');return;}
  document.getElementById('up-body').innerHTML=`<div style="text-align:center;padding:26px"><div class="spin"></div><p style="font-size:13px;color:var(--mu);font-weight:600">🤖 分析中…</p></div>`;
  try{
    let messages;
    if(file.type.startsWith('image/')||file.type==='application/pdf'){
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      messages=[{role:'user',content:[{type:file.type.startsWith('image/')?'image':'document',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:EP}]}];
    }else{messages=[{role:'user',content:EP+'\n\n'+(await file.text()).slice(0,8000)}];}
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2000,messages})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const parsed=JSON.parse(data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim());
    showAI(parsed.events||[]);
  }catch(e){document.getElementById('up-body').innerHTML=`<p style="color:#e57373;text-align:center;padding:14px;font-weight:700">❌ ${e.message}</p>`;setTimeout(resetUp,2500);}
}
window._ai=[];
function showAI(evs){
  if(!evs.length){document.getElementById('up-body').innerHTML=`<div class="empty"><span class="empty-ic">🔍</span><div class="empty-tx">沒有找到事件</div></div>`;setTimeout(resetUp,2000);return;}
  window._ai=evs;
  evs.forEach(ev=>{const rule=matchRule(ev.title);if(rule){ev.category=rule.cat;ev.rems=rule.rems;if(rule.note&&!ev.note)ev.note=rule.note;}});
  let h=`<div class="s-banner">⚡ 找到 ${evs.length} 個事件！</div>`;
  h+=evs.map((ev,i)=>{const c=CATS[ev.category]||CATS.other;return`<div class="ai-item"><input type="checkbox" class="ai-ck" id="ai${i}" checked><div class="ai-info"><div class="ai-name">${c.ic} ${ev.title}</div><div class="ai-meta">📅 ${ev.date||''}${ev.time&&ev.time!='null'?' '+ev.time:''} · <span style="color:${c.cl};font-weight:700">${c.lb}</span>${ev.rems?' · 🔔 '+ev.rems.map(r=>r===0?'當天':r+'天前').join('、'):''}</div></div></div>`;}).join('');
  h+=`<button class="m-save" style="margin-top:13px" onclick="importAI()">✨ 匯入勾選的事件</button>`;
  document.getElementById('up-body').innerHTML=h;
}
function importAI(){
  (window._ai||[]).forEach((ev,i)=>{const cb=document.getElementById('ai'+i);if(!cb||!cb.checked)return;events.unshift({id:Date.now()+i,title:ev.title,date:ev.date||null,time:(ev.time&&ev.time!=='null')?ev.time:null,cat:ev.category||'other',rems:ev.rems||[0],note:ev.note||'',done:false});});
  sv('ev',events);closeUpload();render();toast('✅ 事件已匯入！');
}

// NOTIFICATIONS
function checkNotif(){
  if(!('Notification'in window))return;
  if(Notification.permission==='default')Notification.requestPermission();
  if(Notification.permission!=='granted')return;
  events.forEach(ev=>{
    if(!ev.date||ev.done)return;
    const diff=Math.round((new Date(ev.date+'T00:00:00')-today)/864e5);
    if((ev.rems||[]).includes(diff)){
      const key=`wm4_n_${ev.id}_${diff}`;
      if(!sessionStorage.getItem(key)){new Notification('🐰 WithMe',{body:diff===0?`今天：${ev.title}`:diff===1?`明天：${ev.title}`:`${diff}天後：${ev.title}`});sessionStorage.setItem(key,'1');}
    }
  });
}

// TOAST
function toast(msg){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}

// START
render();
</script>
