<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>With Me 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* 🐰 Usahana palette */
  --bg:#FBF7E9;
  --surface:#FFFFFF;
  --surface2:#F4E4B2;
  --surface3:#F1CC74;
  --border:rgba(159,143,130,0.18);
  --border2:rgba(159,143,130,0.32);
  --text:#4a3f35;
  --muted:#9F8F82;
  --hint:#c8bab0;
  --accent:#F1CC74;
  --accent2:#f0b830;
  --red:#e57373;--green:#81c784;--gold:#F1CC74;
  /* absence: student=warm amber, teacher=taupe brown */
  --student-c:#e8a020;--student-bg:rgba(232,160,32,.13);--student-tc:#7a4e00;
  --teacher-c:#9F8F82;--teacher-bg:rgba(159,143,130,.13);--teacher-tc:#4a3f35;
  --r:14px;--r2:22px;
  --shadow:0 2px 12px rgba(159,143,130,.13);
  --shadow2:0 4px 20px rgba(159,143,130,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(circle at 15% 10%,rgba(241,204,116,.12),transparent 45%),
                   radial-gradient(circle at 85% 85%,rgba(244,228,178,.15),transparent 45%)}
.app{max-width:500px;margin:0 auto;min-height:100vh}

/* HEADER */
.header{padding:20px 18px 0;position:sticky;top:0;z-index:50;background:rgba(251,247,233,.95);backdrop-filter:blur(12px)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.logo{display:flex;align-items:center;gap:7px}
.logo-svg{animation:float 3s ease-in-out infinite;flex-shrink:0}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.logo-text span{color:var(--accent2)}
.date-chip{font-size:11px;color:var(--muted);background:var(--surface);padding:5px 11px;border-radius:999px;border:1px solid var(--border);font-weight:600}

/* NAV */
.nav{display:flex;gap:2px;padding:4px;background:var(--surface);border-radius:var(--r2);margin-bottom:13px;box-shadow:var(--shadow);overflow-x:auto}
.nav-btn{flex:1;min-width:52px;padding:7px 0;border:none;background:transparent;color:var(--hint);font-size:11px;font-weight:700;cursor:pointer;border-radius:18px;transition:all .2s;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:1px}
.nav-btn .nb-icon{font-size:15px;line-height:1}
.nav-btn .nb-lbl{font-size:9px;white-space:nowrap}
.nav-btn.active{background:var(--accent);color:var(--text);box-shadow:0 3px 10px rgba(241,204,116,.45)}

/* QUICK BAR */
.quick-bar{display:flex;gap:7px;margin-bottom:10px}
.quick-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:0 13px;height:44px;color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.quick-input:focus{border-color:var(--accent)}
.quick-input::placeholder{color:var(--hint);font-weight:500}
.icon-btn{width:44px;height:44px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;transition:all .2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--border2);transform:scale(1.06)}
.icon-btn.accent{background:var(--accent);border-color:var(--accent);color:var(--text);box-shadow:0 4px 14px rgba(241,204,116,.45)}

/* PREVIEW */
#preview{margin:0 0 10px;padding:11px 14px;background:var(--surface2);border-radius:var(--r);font-size:13px;display:none;flex-wrap:wrap;gap:10px;align-items:center;border:1.5px dashed var(--border2)}
#preview.show{display:flex}
.prev-lbl{color:var(--muted);font-size:11px;font-weight:600}
.rule-badge{font-size:10px;color:#8d6e00;background:rgba(255,213,79,.2);border:1px solid rgba(255,213,79,.4);padding:2px 9px;border-radius:999px;font-weight:700}

/* SECTION */
.section{padding:0 18px 120px}
.section-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;margin-top:4px}
.section-title{font-size:11px;font-weight:800;color:var(--hint);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:5px}

/* ALERTS */
.alert-card{background:linear-gradient(135deg,rgba(255,140,105,.08),rgba(255,179,71,.08));border:1.5px solid rgba(255,140,105,.22);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;animation:popIn .3s ease}
@keyframes popIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.alert-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.alert-title{font-size:13px;font-weight:700;margin-bottom:2px}
.alert-sub{font-size:11px;color:var(--muted);font-weight:600}

/* ABSENCE ALERT — special */
.absence-alert{border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;animation:popIn .3s ease}
.absence-alert.student{background:rgba(124,77,255,.07);border:1.5px solid rgba(124,77,255,.25)}
.absence-alert.teacher{background:rgba(229,57,53,.07);border:1.5px solid rgba(229,57,53,.25)}

/* CALENDAR */
.cal-wrap{background:var(--surface);border-radius:var(--r2);padding:16px;margin-bottom:14px;box-shadow:var(--shadow2);border:1px solid var(--border)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:16px;cursor:pointer;padding:5px 12px;border-radius:999px;transition:all .15s;font-family:'Nunito',sans-serif;font-weight:700}
.cal-nav-btn:hover{color:var(--accent)}
.cal-month-lbl{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
.cal-dow-cell{text-align:center;font-size:10px;color:var(--hint);font-weight:800;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;gap:2px;transition:all .15s;position:relative}
.cal-day:hover{background:var(--surface2);transform:scale(1.08)}
.cal-day.today{background:var(--accent);color:var(--text);font-weight:800;box-shadow:0 3px 10px rgba(241,204,116,.4)}
.cal-day .dot-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:28px}
.cal-day .dot{width:4px;height:4px;border-radius:50%}
/* absence markers on calendar */
.cal-day .abs-mark{position:absolute;top:2px;right:3px;font-size:8px;line-height:1}

/* WEEK */
.week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.week-lbl{font-size:14px;font-weight:800}
.week-grid{display:flex;flex-direction:column;gap:8px}
.week-row{display:flex;gap:10px;align-items:flex-start}
.week-day-label{width:36px;flex-shrink:0;text-align:center}
.week-day-name{font-size:9px;color:var(--hint);font-weight:800;text-transform:uppercase}
.week-day-num{font-size:18px;font-weight:800;line-height:1.1}
.week-day-num.today{color:var(--accent2)}
.week-events{flex:1;display:flex;flex-direction:column;gap:3px;min-height:34px;border-left:2px solid var(--border);padding-left:10px}
.week-ev{padding:7px 11px;border-radius:10px;font-size:12px;font-weight:700;border-left:3px solid transparent;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s}
.week-ev:hover{transform:translateX(2px)}
.week-empty{font-size:11px;color:var(--hint);padding:7px 10px;font-weight:600}

/* EVENT CARDS */
.ev-list{display:flex;flex-direction:column;gap:8px}
.ev-card{background:var(--surface);border-radius:var(--r);padding:14px 16px;border-left:4px solid var(--hint);transition:all .2s;box-shadow:var(--shadow);border:1px solid var(--border);border-left-width:4px}
.ev-card:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}
.ev-card.done{opacity:.4;filter:grayscale(.4)}
/* ABSENCE CARD SPECIAL STYLES */
.ev-card.abs-student{border-left-color:var(--student-c)!important;background:linear-gradient(135deg,rgba(124,77,255,.04),var(--surface))}
.ev-card.abs-teacher{border-left-color:var(--teacher-c)!important;background:linear-gradient(135deg,rgba(229,57,53,.04),var(--surface))}
.ev-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.ev-cat-icon{font-size:18px;flex-shrink:0}
.ev-title{font-size:14px;font-weight:700;flex:1}
.ev-date-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);font-weight:500}
.tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px}
/* ABSENCE TAGS */
.abs-tag-student{background:var(--student-bg);color:var(--student-tc);border:1px solid rgba(124,77,255,.2)}
.abs-tag-teacher{background:var(--teacher-bg);color:var(--teacher-tc);border:1px solid rgba(229,57,53,.2)}

/* ABSENCE NOTE BLOCKS */
.abs-block{border-radius:10px;padding:10px 13px;margin-top:8px;font-size:12px;font-weight:600;line-height:1.7}
.abs-block.student{background:var(--student-bg);border-left:3px solid var(--student-c)}
.abs-block.teacher{background:var(--teacher-bg);border-left:3px solid var(--teacher-c)}
.abs-block-title{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.abs-block.student .abs-block-title{color:var(--student-tc)}
.abs-block.teacher .abs-block-title{color:var(--teacher-tc)}
.abs-block-row{display:flex;gap:8px;align-items:baseline;margin-bottom:3px}
.abs-block-lbl{font-size:10px;color:var(--muted);min-width:52px;flex-shrink:0}
.abs-block-val{font-size:12px;font-weight:700;color:var(--text)}
.makeup-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:800;margin-top:4px}
.makeup-badge.pending{background:rgba(255,213,79,.2);color:#7a5e00;border:1px solid rgba(255,213,79,.35)}
.makeup-badge.done{background:rgba(165,214,167,.2);color:#2a6040;border:1px solid rgba(165,214,167,.4)}

.ev-note{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6;font-weight:600;padding:7px 10px;background:var(--surface2);border-radius:8px;white-space:pre-wrap}
.rem-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.rem-chip{font-size:10px;padding:3px 9px;border-radius:999px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);font-weight:700;display:flex;align-items:center;gap:3px}
.ev-actions{display:flex;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.ev-act-btn{padding:5px 11px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:3px}
.ev-act-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.ev-act-btn.danger:hover{color:#c0392b;border-color:#f48fb1;background:#fff5f5}
.ev-act-btn.ok:hover{color:#2e7d32;border-color:var(--green);background:#f5fff5}
.ev-act-btn.makeup-done-btn{color:var(--student-tc);border-color:rgba(124,77,255,.3)}
.ev-act-btn.makeup-done-btn:hover{background:var(--student-bg)}
.month-sep{font-size:11px;font-weight:800;color:var(--hint);padding:14px 0 6px;display:flex;align-items:center;gap:8px}
.month-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* ABSENCE VIEW */
.abs-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.abs-stat{background:var(--surface);border-radius:var(--r);padding:13px 14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.abs-stat.student{border-left:4px solid var(--student-c)}
.abs-stat.teacher{border-left:4px solid var(--teacher-c)}
.abs-stat-num{font-size:26px;font-weight:800;margin-bottom:2px}
.abs-stat-num.student{color:var(--student-c)}
.abs-stat-num.teacher{color:var(--teacher-c)}
.abs-stat-lbl{font-size:11px;color:var(--muted);font-weight:600}
.abs-stat-sub{font-size:10px;color:var(--hint);font-weight:600;margin-top:2px}
.abs-filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.abs-filter{padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.abs-filter:hover{border-color:var(--border2)}
.abs-filter.active-all{background:var(--accent);color:#fff;border-color:var(--accent)}
.abs-filter.active-student{background:var(--student-c);color:#fff;border-color:var(--student-c)}
.abs-filter.active-teacher{background:var(--teacher-c);color:#fff;border-color:var(--teacher-c)}
.abs-filter.active-pending{background:#f5c842;color:#7a5e00;border-color:#f5c842}

/* EMPTY STATES */
.empty{text-align:center;padding:36px 20px;color:var(--hint)}
.empty-art{font-size:48px;margin-bottom:10px;animation:float 3s ease-in-out infinite;display:block}
.empty-msg{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:4px}
.empty-sub{font-size:12px;font-weight:600;color:var(--hint)}

/* RULES VIEW */
.rules-intro{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7;padding:13px 15px;background:var(--surface);border-radius:var(--r);border-left:4px solid var(--gold);font-weight:600;box-shadow:var(--shadow)}
.rule-form{background:var(--surface);border-radius:var(--r2);padding:18px;margin-bottom:16px;box-shadow:var(--shadow2);border:1px solid var(--border)}
.rf{margin-bottom:12px}
.rf label{display:block;font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase}
.rf input,.rf textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.rf input:focus,.rf textarea:focus{border-color:var(--accent)}
.rf textarea{resize:none;height:60px;line-height:1.5}
.toggle-group{display:flex;gap:6px;flex-wrap:wrap}
.toggle-btn{padding:6px 13px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.toggle-btn.on{background:var(--accent);border-color:var(--accent2);color:var(--text);box-shadow:0 2px 8px rgba(241,204,116,.4)}
.add-rule-btn{width:100%;height:42px;background:var(--accent);color:var(--text);border:none;border-radius:var(--r);font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px;box-shadow:0 4px 14px rgba(241,204,116,.4);transition:opacity .15s}
.add-rule-btn:hover{opacity:.88}
.rule-card{background:var(--surface);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;border-left:4px solid var(--accent);display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow);border:1px solid var(--border);border-left-width:4px}
.rule-card.builtin{border-left-color:var(--hint)}
.rule-body{flex:1}
.rule-kw{font-size:14px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.rule-meta{font-size:11px;color:var(--muted);font-weight:600;line-height:1.8}
.rule-note-preview{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px;font-weight:600}
.rule-del{background:none;border:none;color:var(--hint);font-size:20px;cursor:pointer;line-height:1;padding:0;flex-shrink:0;transition:color .15s}
.rule-del:hover{color:var(--red)}
.builtin-tag{font-size:9px;padding:2px 7px;border-radius:5px;background:var(--surface2);color:var(--hint);font-weight:700;border:1px solid var(--border)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(80,40,20,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal{background:var(--bg);border-radius:28px 28px 0 0;padding:24px 20px 44px;width:100%;max-width:500px;animation:slideUp .24s cubic-bezier(.34,1.56,.64,1);max-height:92vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--surface2);border:none;color:var(--muted);font-size:18px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:none;height:72px;line-height:1.5}
.field select option{background:var(--surface)}
.field-row{display:flex;gap:10px;min-width:0}.field-row .field{flex:1;min-width:0}
.field-row .field input{min-width:0;width:100%}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap}
.cat-pill{padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.rem-pills{display:flex;gap:6px;flex-wrap:wrap}
.rem-pill-btn{padding:6px 13px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.rem-pill-btn.active{background:var(--accent);border-color:var(--accent2);color:var(--text)}
/* absence form section inside modal */
.abs-form-section{background:var(--surface2);border-radius:var(--r);padding:14px;margin-bottom:13px;border:1.5px dashed var(--border2)}
.abs-form-section.student-section{border-color:rgba(232,160,32,.35);background:rgba(232,160,32,.06)}
.abs-form-section.teacher-section{border-color:rgba(159,143,130,.35);background:rgba(159,143,130,.06)}
.abs-section-title{font-size:12px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.abs-section-title.student{color:var(--student-tc)}
.abs-section-title.teacher{color:var(--teacher-tc)}
.save-btn{width:100%;height:48px;background:var(--accent);color:var(--text);border:none;border-radius:var(--r);font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .15s;box-shadow:0 4px 16px rgba(241,204,116,.4);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn.purple-btn{background:var(--student-bg);color:var(--student-tc);border:2px solid var(--student-c);box-shadow:none}
.save-btn.red-btn{background:var(--teacher-bg);color:var(--teacher-tc);border:2px solid var(--teacher-c);box-shadow:none}
.save-btn:hover{opacity:.88}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:12px;background:var(--surface2)}
.upload-zone:hover{border-color:var(--accent)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-hint{font-size:13px;color:var(--muted);line-height:1.7;font-weight:600}
.api-row{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.api-inp{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;outline:none}
.api-inp:focus{border-color:var(--accent)}
.api-saved{font-size:12px;color:#2e7d32;font-weight:700;flex-shrink:0}
.spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-ev-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}

.ai-ev-check{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;margin-top:2px}

.fab-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:468px;z-index:40;display:flex;gap:8px}

.fab-main:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(241,204,116,.6)}
.fab-abs{width:52px;height:52px;border:2px solid var(--border2);border-radius:var(--r2);font-size:22px;cursor:pointer;background:var(--surface);box-shadow:var(--shadow2);transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fab-abs:hover{transform:translateY(-2px);background:var(--surface2)}
.fab-abs.student{border-color:var(--student-c)}
.fab-abs.teacher{border-color:var(--teacher-c)}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--surface);border:1.5px solid rgba(255,213,79,.4);color:#7a5e00;padding:10px 18px;border-radius:999px;font-size:12px;font-weight:700;z-index:200;max-width:340px;text-align:center;box-shadow:var(--shadow2);white-space:nowrap}
</style>

<script>
// ═══════════════════════════
// CONFIG
// ═══════════════════════════
const CATS={
  work:    {label:'工作',  icon:'💼',color:'#5ab4d6',bg:'rgba(90,180,214,.13)', tc:'#1a5a78',remDef:[1]},
  meeting: {label:'座談',  icon:'🤝',color:'#9c7fd6',bg:'rgba(156,127,214,.13)',tc:'#4a3070',remDef:[7,1]},
  event:   {label:'活動',  icon:'🎉',color:'#6abf78',bg:'rgba(106,191,120,.13)',tc:'#2a6040',remDef:[3,1]},
  deadline:{label:'截止',  icon:'⏳',color:'#e0708a',bg:'rgba(224,112,138,.13)',tc:'#802050',remDef:[7,3,1]},
  other:   {label:'其他',  icon:'📌',color:'#e0a840',bg:'rgba(224,168,64,.13)', tc:'#7a5010',remDef:[0]},
};
const REM_OPTIONS=[{l:'當天',d:0},{l:'1天前',d:1},{l:'3天前',d:3},{l:'7天前',d:7},{l:'2週前',d:14}];
const DOW_ZH=['一','二','三','四','五','六','日'];
const MONTH_ICONS=['🎍','🌸','🌼','🌷','🌻','🌞','🌊','🍉','🍂','🎃','🍁','⛄'];

const BUILTIN_RULES=[
  {id:'b1',kw:'親師座談',cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b2',kw:'PTA',cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b3',kw:'一對一',cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b4',kw:'期中評量',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b5',kw:'期末評量',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b6',kw:'英語競賽',cat:'event',rems:[7,3,1],note:'',builtin:true},
  {id:'b7',kw:'說明會',cat:'meeting',rems:[7,1],note:'',builtin:true},
  {id:'b8',kw:'截止',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b9',kw:'放假',cat:'other',rems:[0],note:'',builtin:true},
];

// ═══════════════════════════
// STATE
// ═══════════════════════════
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lss(k,v){localStorage.setItem(k,JSON.stringify(v));}

let events      = ls('wc4_events',[]);
let absences    = ls('wc4_abs',[]);      // absence records
let customRules = ls('wc4_rules',[]);
let editId=null,selRems=[],selCat='work';
let rfRems=[1],rfCat='work';
let absFilter='all';
let currentView='today';
let editAbsId=null;
const today=new Date();today.setHours(0,0,0,0);
let calYear=today.getFullYear(),calMonth=today.getMonth();
let weekStart=(()=>{const d=new Date(today);d.setDate(today.getDate()-(today.getDay()||7)+1);return d;})();

function saveEv(){lss('wc4_events',events);}
function saveAbs(){lss('wc4_abs',absences);}
function saveRules(){lss('wc4_rules',customRules);}
function fmtDate(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function fmtDisp(iso){if(!iso)return'';const[,m,d]=iso.split('-');return`${+m}/${+d}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isoToday(){return fmtDate(today);}
function allRules(){return[...customRules,...BUILTIN_RULES];}
function matchRule(t){for(const r of allRules())if(t.includes(r.kw))return r;return null;}

document.getElementById('date-chip').textContent=today.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});

// ═══════════════════════════
// QUICK INPUT
// ═══════════════════════════
document.getElementById('qtxt').addEventListener('input',function(){showPreview(this.value);});
document.getElementById('qtxt').addEventListener('keydown',e=>{if(e.key==='Enter')quickAdd();});

function parseQuick(raw){
  let date=null;const yr=today.getFullYear();
  const m=raw.match(/(\d{1,2})\/(\d{1,2})/);
  if(m)date=`${yr}-${p2(m[1])}-${p2(m[2])}`;
  if(!date){
    if(/今天/.test(raw))date=isoToday();
    if(/明天/.test(raw))date=fmtDate(addDays(today,1));
    const wm=raw.match(/週([一二三四五六日天])/);
    if(wm){const wmap={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};const t=wmap[wm[1]];let diff=t-today.getDay();if(diff<=0)diff+=7;date=fmtDate(addDays(today,diff));}
  }
  let time=null;const tm=raw.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
  if(tm&&parseInt(tm[1])<=24){let h=parseInt(tm[1]),mn=parseInt(tm[2]||0);if(tm[3]&&/pm/i.test(tm[3])&&h<12)h+=12;time=`${p2(h)}:${p2(mn)}`;}
  let title=raw.replace(/\d{1,2}\/\d{1,2}/,'').replace(/(\d{1,2})(?::\d{2})?\s*(?:am|pm)?/i,'').replace(/今天|明天|週[一二三四五六日天]/,'').trim()||raw.trim();
  const rule=matchRule(title)||matchRule(raw);
  return{title,date,time,rule};
}

function showPreview(raw){
  const box=document.getElementById('preview');
  if(!raw.trim()){box.className='';box.innerHTML='';return;}
  const{title,date,time,rule}=parseQuick(raw);
  const cat=rule?rule.cat:'work';const c=CATS[cat];
  const rems=rule?rule.rems:c.remDef;
  box.className='show';
  box.innerHTML=`
    <div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">${c.icon}</span><b style="font-size:13px">${title||'—'}</b></div>
    <b style="font-size:12px">${date?fmtDisp(date):'未偵測'}</b>
    <span class="tag" style="background:${c.bg};color:${c.tc}">${c.icon} ${c.label}</span>
    <span style="font-size:11px;color:var(--muted);font-weight:600">🔔 ${rems.map(r=>r===0?'當天':r+'天前').join('、')}</span>
    ${rule?`<span class="rule-badge">⚡ ${rule.kw}</span>`:''}`;
}

function quickAdd(){
  const raw=document.getElementById('qtxt').value.trim();if(!raw)return;
  const{title,date,time,rule}=parseQuick(raw);
  const cat=rule?rule.cat:'work';
  events.unshift({id:Date.now(),title,date,time,cat,rems:rule?rule.rems:CATS[cat].remDef,note:rule?rule.note:'',done:false});
  saveEv();render();
  document.getElementById('qtxt').value='';
  document.getElementById('preview').className='';document.getElementById('preview').innerHTML='';
  if(rule)toast(`⚡ 套用規則「${rule.kw}」`);
}

function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// VIEWS
// ═══════════════════════════
function setView(v,btn){
  currentView=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render();
}

function render(){
  const sec=document.getElementById('main-section');
  if(currentView==='today')        sec.innerHTML=renderToday();
  else if(currentView==='week')    sec.innerHTML=renderWeek();
  else if(currentView==='month')   sec.innerHTML=renderMonth();
  else if(currentView==='absence') sec.innerHTML=renderAbsence();
  else if(currentView==='rules')   {sec.innerHTML=renderRules();buildRFCats();buildRFRems();}
  else                             sec.innerHTML=renderAll();
  document.querySelectorAll('.week-ev[data-id]').forEach(el=>{
    el.addEventListener('click',()=>openAdd(+el.dataset.id));
  });
  checkNotifications();
}

// TODAY
function renderToday(){
  const iso=isoToday();
  const todayEvs=events.filter(e=>e.date===iso&&!e.done);
  const reminders=events.filter(e=>{
    if(!e.date||e.done)return false;
    const diff=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);
    return diff>0&&(e.rems||[]).includes(diff);
  });
  // absences today
  const todayAbs=absences.filter(a=>a.date===iso);
  let html='';

  // absence alerts first
  if(todayAbs.length){
    html+=`<div class="section-hd"><span class="section-title">🚨 今日請假</span></div>`;
    todayAbs.forEach(a=>{
      const isS=a.type==='student';
      html+=`<div class="absence-alert ${isS?'student':'teacher'}">
        <div style="font-size:20px">${isS?'📝':'🏫'}</div>
        <div>
          <div class="alert-title" style="color:${isS?'var(--student-tc)':'var(--teacher-tc)'}">${isS?'【學生請假】':'【老師請假】'} ${a.name}</div>
          ${isS&&a.makeup?`<div class="alert-sub">📚 待補進度：${a.makeup}</div>`:''}
          ${!isS&&a.sub?`<div class="alert-sub">👤 代課：${a.sub}</div>`:''}
          ${a.note?`<div class="alert-sub">📝 ${a.note}</div>`:''}
          ${isS&&!a.makeupDone?`<div style="margin-top:5px"><span class="makeup-badge pending">⏳ 補課待安排</span></div>`:''}
          ${isS&&a.makeupDone?`<div style="margin-top:5px"><span class="makeup-badge done">✅ 已補課</span></div>`:''}
        </div>
      </div>`;
    });
  }

  // pending makeups
  const pendingMakeup=absences.filter(a=>a.type==='student'&&!a.makeupDone&&a.makeup);
  if(pendingMakeup.length){
    html+=`<div class="section-hd" style="margin-top:${todayAbs.length?14:4}px"><span class="section-title">📚 待補進度</span></div>`;
    pendingMakeup.forEach(a=>{
      html+=`<div style="background:var(--student-bg);border:1.5px solid var(--student-c);border-radius:var(--r);padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--student-tc)">📝 ${a.name}</div>
          <div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:2px">📚 ${a.makeup} &nbsp;·&nbsp; 假期：${fmtDisp(a.date)}</div>
        </div>
        <button class="ev-act-btn makeup-done-btn" onclick="markMakeupDone(${a.id})" style="white-space:nowrap;font-size:11px">✅ 已補</button>
      </div>`;
    });
  }

  if(reminders.length){
    html+=`<div class="section-hd" style="margin-top:${(todayAbs.length||pendingMakeup.length)?14:4}px"><span class="section-title">🔔 今日提醒</span></div>`;
    reminders.forEach(ev=>{
      const c=CATS[ev.cat]||CATS.other;
      const diff=Math.round((new Date(ev.date+'T00:00:00')-today)/864e5);
      html+=`<div class="alert-card"><div class="alert-icon">${c.icon}</div>
        <div><div class="alert-title">${ev.title}</div>
        <div class="alert-sub">📅 ${diff}天後（${fmtDisp(ev.date)}）${ev.note?' · '+ev.note.slice(0,25):''}</div></div></div>`;
    });
  }

  const topCount=todayAbs.length+pendingMakeup.length+reminders.length;
  html+=`<div class="section-hd" style="margin-top:${topCount?16:4}px"><span class="section-title">☀️ 今日事件</span></div>`;
  if(!todayEvs.length)html+=`<div class="empty">
    <svg width="70" height="70" viewBox="0 0 70 70" fill="none" style="display:block;margin:0 auto 10px;animation:float 3s ease-in-out infinite">
      <circle cx="35" cy="42" r="24" fill="#FBF7E9" stroke="#4a3f35" stroke-width="2"/>
      <circle cx="22" cy="20" r="8" fill="#FBF7E9" stroke="#4a3f35" stroke-width="1.8"/>
      <circle cx="48" cy="20" r="8" fill="#FBF7E9" stroke="#4a3f35" stroke-width="1.8"/>
      <ellipse cx="26" cy="39" rx="4" ry="4" fill="#4a3f35"/>
      <ellipse cx="44" cy="39" rx="4" ry="4" fill="#4a3f35"/>
      <ellipse cx="27.5" cy="37.5" rx="1.5" ry="1.5" fill="white"/>
      <ellipse cx="45.5" cy="37.5" rx="1.5" ry="1.5" fill="white"/>
      <ellipse cx="19" cy="43" rx="5" ry="3.5" fill="#f8c0c8" opacity="0.65"/>
      <ellipse cx="51" cy="43" rx="5" ry="3.5" fill="#f8c0c8" opacity="0.65"/>
      <path d="M27 48 Q35 54 43 48" stroke="#4a3f35" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="empty-msg">今天沒有事件</div><div class="empty-sub">輕鬆的一天！</div></div>`;
  else html+=renderCards(todayEvs);
  const upcoming=events.filter(e=>{
    if(!e.date||e.done)return false;
    const diff=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);
    return diff>0&&diff<=7;
  }).sort((a,b)=>a.date.localeCompare(b.date));
  if(upcoming.length){html+=`<div class="section-hd" style="margin-top:20px"><span class="section-title">📅 未來7天</span></div>`;html+=renderCards(upcoming);}
  return html;
}

function markMakeupDone(id){

// WEEK
function renderWeek(){
  const end=addDays(weekStart,6);
  let html=`<div class="week-nav">
    <button class="cal-nav-btn" onclick="weekPrev()">‹</button>
    <span class="week-lbl">📋 ${weekStart.getMonth()+1}/${weekStart.getDate()} – ${end.getMonth()+1}/${end.getDate()}</span>
    <button class="cal-nav-btn" onclick="weekNext()">›</button>
  </div><div class="week-grid">`;
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i);const iso=fmtDate(d);const isT=iso===isoToday();
    const dayEvs=events.filter(e=>e.date===iso&&!e.done);
    const dayAbs=absences.filter(a=>a.date===iso);
    html+=`<div class="week-row">
      <div class="week-day-label"><div class="week-day-name">${DOW_ZH[i]}</div><div class="week-day-num${isT?' today':''}">${d.getDate()}</div></div>
      <div class="week-events">`;
    dayAbs.forEach(a=>{
      const isS=a.type==='student';
      html+=`<div class="week-ev" style="background:${isS?'var(--student-bg)':'var(--teacher-bg)'};border-left-color:${isS?'var(--student-c)':'var(--teacher-c)'}" onclick="openAbsModal(null,${a.id})">${isS?'🎒':'👩‍🏫'} ${a.name}</div>`;
    });
    if(!dayEvs.length&&!dayAbs.length)html+=`<span class="week-empty">—</span>`;
    dayEvs.forEach(ev=>{const c=CATS[ev.cat]||CATS.other;html+=`<div class="week-ev" style="background:${c.bg};border-left-color:${c.color}" data-id="${ev.id}">${c.icon} ${ev.title}</div>`;});
    html+=`</div></div>`;
  }
  return html+'</div>';
}
function weekPrev(){weekStart=addDays(weekStart,-7);render();}
function weekNext(){weekStart=addDays(weekStart,7);render();}

// MONTH
function renderMonth(){
  const first=(new Date(calYear,calMonth,1).getDay()||7)-1;
  const days=new Date(calYear,calMonth+1,0).getDate();
  let html=`<div class="cal-wrap">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <span class="cal-month-lbl">${MONTH_ICONS[calMonth]} ${calYear}年${calMonth+1}月</span>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-dow">${DOW_ZH.map(d=>`<div class="cal-dow-cell">${d}</div>`).join('')}</div>
    <div class="cal-grid">`;
  html+=Array(first).fill('<div></div>').join('');
  for(let d=1;d<=days;d++){
    const iso=`${calYear}-${p2(calMonth+1)}-${p2(d)}`;
    const evs=events.filter(e=>e.date===iso&&!e.done);
    const abs=absences.filter(a=>a.date===iso);
    const isT=iso===isoToday();
    const dots=evs.slice(0,3).map(e=>`<div class="dot" style="background:${(CATS[e.cat]||CATS.other).color}"></div>`).join('');
    const absMark=abs.length?abs.map(a=>a.type==='student'?'<span style="font-size:7px">🎒</span>':'<span style="font-size:7px">👩‍🏫</span>').join(''):'';
    html+=`<div class="cal-day${isT?' today':''}" onclick="openAdd(null,'${iso}')">

  html+=`</div></div>`;
  const mo=`${calYear}-${p2(calMonth+1)}`;
  const moEvs=events.filter(e=>e.date?.startsWith(mo)).sort((a,b)=>a.date.localeCompare(b.date));
  const moAbs=absences.filter(a=>a.date?.startsWith(mo)).sort((a,b)=>a.date.localeCompare(b.date));
  if(moAbs.length){

    html+=moAbs.map(a=>absCard(a)).join('');

  html+=moEvs.length?`<div class="section-hd" style="margin-top:${moAbs.length?14:0}px"><span class="section-title">📅 本月事件</span></div>`+renderCards(moEvs):`<div class="empty">

      <circle cx="30" cy="36" r="20" fill="#fffbe8" stroke="#4a3f35" stroke-width="1.8"/>
      <circle cx="30" cy="36" r="20" fill="#F4E4B2" stroke="#4a3f35" stroke-width="1.8"/>
      <circle cx="20.5" cy="17.5" r="6.5" fill="#F4E4B2" stroke="#4a3f35" stroke-width="1.6"/>
      <circle cx="39.5" cy="17.5" r="6.5" fill="#F4E4B2" stroke="#4a3f35" stroke-width="1.6"/>
      <ellipse cx="23.5" cy="34" rx="3.5" ry="3.5" fill="#4a3f35"/>
      <ellipse cx="36.5" cy="34" rx="3.5" ry="3.5" fill="#4a3f35"/>
      <ellipse cx="24.5" cy="32.8" rx="1.2" ry="1.2" fill="white"/>
      <ellipse cx="37.5" cy="32.8" rx="1.2" ry="1.2" fill="white"/>
      <ellipse cx="14" cy="38" rx="4" ry="2.5" fill="#f8c0c8" opacity="0.65"/>
      <ellipse cx="46" cy="38" rx="4" ry="2.5" fill="#f8c0c8" opacity="0.65"/>
      <path d="M24 41 Q30 46.5 36 41" stroke="#4a3f35" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <text x="30" y="55" text-anchor="middle" font-size="8" fill="#9F8F82" font-family="Nunito,sans-serif" font-weight="700">${MONTH_ICONS[calMonth]}</text>
    </svg>
    <div class="empty-msg">這個月沒有事件</div></div>`;
  return html;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();}

// ALL
function renderAll(){
  const sorted=[...events].sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
  if(!sorted.length)return`<div class="empty">
    <svg width="70" height="70" viewBox="0 0 70 70" fill="none" style="display:block;margin:0 auto 10px;animation:float 3s ease-in-out infinite">
      <circle cx="35" cy="44" r="22" fill="#d0ecf8" stroke="#4a3f35" stroke-width="2"/>
      <path d="M20 22 Q24 12 28 18 Q32 10 35 16 Q38 10 42 18 Q46 12 50 22" stroke="#4a3f35" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="27" cy="41" rx="4" ry="4" fill="#4a3f35"/>
      <ellipse cx="43" cy="41" rx="4" ry="4" fill="#4a3f35"/>
      <ellipse cx="28.5" cy="39.5" rx="1.5" ry="1.5" fill="white"/>
      <ellipse cx="44.5" cy="39.5" rx="1.5" ry="1.5" fill="white"/>
      <ellipse cx="19" cy="45" rx="5" ry="3" fill="#f8c0c8" opacity="0.65"/>
      <ellipse cx="51" cy="45" rx="5" ry="3" fill="#f8c0c8" opacity="0.65"/>
      <path d="M28 49 Q35 55 42 49" stroke="#4a3f35" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- 小魚裝飾 -->
      <ellipse cx="35" cy="60" rx="5" ry="2.5" fill="#d0ecf8" stroke="#4a3f35" stroke-width="1.2"/>
    </svg>
    <div class="empty-msg">還沒有任何事件</div><div class="empty-sub">快速輸入或按下 ＋ 開始吧！</div></div>`;
  let html='',lastMo='';
  sorted.forEach(ev=>{
    const mo=ev.date?ev.date.slice(0,7):'';
    if(mo!==lastMo){const idx=ev.date?parseInt(ev.date.slice(5,7))-1:0;html+=`<div class="month-sep">${MONTH_ICONS[idx]||'📅'} ${ev.date?parseInt(ev.date.slice(5,7))+'月':'無日期'}</div>`;lastMo=mo;}
    html+=renderCard(ev);
  });
  return`<div class="ev-list">${html}</div>`;
}

        <circle cx="38" cy="17" r="7" fill="#fde8ef" stroke="#4a3f35" stroke-width="1.6"/>
        <ellipse cx="22" cy="32" rx="3.5" ry="3.5" fill="#4a3f35"/>
        <ellipse cx="34" cy="32" rx="3.5" ry="3.5" fill="#4a3f35"/>
        <ellipse cx="23" cy="31" rx="1.2" ry="1.2" fill="white"/>
        <ellipse cx="35" cy="31" rx="1.2" ry="1.2" fill="white"/>
        <ellipse cx="14" cy="36" rx="4" ry="2.5" fill="#f8c0c8" opacity="0.65"/>

function ruleCard(r,builtin=false){
  const c=CATS[r.cat]||CATS.other;
  return`<div class="rule-card${builtin?' builtin':''}">
    <div class="rule-body">
      <div class="rule-kw">${c.icon} ${r.kw}${builtin?'<span class="builtin-tag">內建</span>':''}</div>
      <div class="rule-meta"><span class="tag" style="background:${c.bg};color:${c.tc}">${c.icon} ${c.label}</span> · 🔔 ${r.rems.map(x=>x===0?'當天':x+'天前').join('、')}</div>
      ${r.note?`<div class="rule-note-preview">📝 ${r.note.slice(0,42)}${r.note.length>42?'…':''}</div>`:''}
    </div>
    ${!builtin?`<button class="rule-del" onclick="delRule('${r.id}')">🗑️</button>`:''}
  </div>`;
}
function buildRFCats(){
  const el=document.getElementById('rf-cats');if(!el)return;
  el.innerHTML=Object.entries(CATS).map(([k,v])=>`<button class="toggle-btn${rfCat===k?' on':''}" style="${rfCat===k?`background:${v.bg};border-color:${v.color};color:${v.tc}`:''}" onclick="setRFCat('${k}')">${v.icon} ${v.label}</button>`).join('');
}
function buildRFRems(){
  const el=document.getElementById('rf-rems');if(!el)return;
  el.innerHTML=REM_OPTIONS.map(o=>`<button class="toggle-btn${rfRems.includes(o.d)?' on':''}" onclick="toggleRFRem(${o.d})">${o.l}</button>`).join('');
}
function setRFCat(k){rfCat=k;buildRFCats();}
function toggleRFRem(d){rfRems=rfRems.includes(d)?rfRems.filter(r=>r!==d):[...rfRems,d];buildRFRems();}
function addCustomRule(){
  const kw=(document.getElementById('rf-kw')?.value||'').trim();
  if(!kw){toast('⚠️ 請輸入關鍵字');return;}
  if(!rfRems.length){toast('⚠️ 請選擇提醒時間');return;}
  customRules.push({id:'c'+Date.now(),kw,cat:rfCat,rems:rfRems,note:(document.getElementById('rf-note')?.value||'').trim(),builtin:false});
  saveRules();rfRems=[1];rfCat='work';toast(`✅ 規則「${kw}」已新增！`);render();
}
function delRule(id){customRules=customRules.filter(r=>r.id!==id);saveRules();render();}

// ═══════════════════════════
// EVENT CARDS
// ═══════════════════════════
function renderCards(evs){return`<div class="ev-list">${evs.map(renderCard).join('')}</div>`;}
function renderCard(ev){
  const c=CATS[ev.cat]||CATS.other;
  const rems=(ev.rems||[]).map(r=>r===0?'當天':r+'天前').join('、');
  return`<div class="ev-card${ev.done?' done':''}" style="border-left-color:${c.color}">
    <div class="ev-head">
      <span class="ev-cat-icon">${c.icon}</span>
      <span class="ev-title">${ev.title}</span>
      <span class="ev-date-lbl">${fmtDisp(ev.date)}${ev.time?' '+ev.time:''}</span>
    </div>
    <span class="tag" style="background:${c.bg};color:${c.tc}">${c.label}</span>
    ${ev.note?`<div class="ev-note">${ev.note}</div>`:''}
    ${rems?`<div class="rem-row"><span class="rem-chip">🔔 ${rems}</span></div>`:''}
    <div class="ev-actions">
      <button class="ev-act-btn ok" onclick="toggleDone(${ev.id})">${ev.done?'↩️ 恢復':'✅ 完成'}</button>
      <button class="ev-act-btn" onclick="openAdd(${ev.id})">✏️ 編輯</button>
      <button class="ev-act-btn danger" onclick="delEv(${ev.id})">🗑️ 刪除</button>
    </div>
  </div>`;
}
function toggleDone(id){events=events.map(e=>e.id===id?{...e,done:!e.done}:e);saveEv();render();}
function delEv(id){if(!confirm('確定刪除？'))return;events=events.filter(e=>e.id!==id);saveEv();render();}

// ═══════════════════════════
// ADD/EDIT EVENT MODAL
// ═══════════════════════════
function buildCatPills(){
  document.getElementById('cat-pills').innerHTML=Object.entries(CATS).map(([k,v])=>`<button class="cat-pill${selCat===k?' active':''}" style="${selCat===k?`background:${v.bg};border-color:${v.color};color:${v.tc}`:''}" onclick="setModalCat('${k}')">${v.icon} ${v.label}</button>`).join('');
}
function buildRemPills(){
  document.getElementById('rem-pills').innerHTML=REM_OPTIONS.map(o=>`<button class="rem-pill-btn${selRems.includes(o.d)?' active':''}" onclick="toggleModalRem(${o.d})">${o.l}</button>`).join('');
}
function setModalCat(k){selCat=k;selRems=[...(CATS[k]?.remDef||[1])];buildCatPills();buildRemPills();}
function toggleModalRem(d){selRems=selRems.includes(d)?selRems.filter(r=>r!==d):[...selRems,d];buildRemPills();}

function openAdd(id=null,prefillDate=null){
  editId=id;
  if(id){
    const ev=events.find(e=>e.id===id);
    document.getElementById('f-title').value=ev.title;
    document.getElementById('f-date').value=ev.date||'';
    document.getElementById('f-time').value=ev.time||'';
    document.getElementById('f-note').value=ev.note||'';
    selCat=ev.cat;selRems=[...(ev.rems||[])];
    document.getElementById('modal-ttl').textContent='編輯事件';
    document.getElementById('modal-icon').textContent='✏️';
  }else{
    document.getElementById('f-title').value='';
    document.getElementById('f-date').value=prefillDate||isoToday();
    document.getElementById('f-time').value='';
    document.getElementById('f-note').value='';
    selCat='work';selRems=[1];
    document.getElementById('modal-ttl').textContent='新增事件';
    document.getElementById('modal-icon').textContent='🌟';
  }
  buildCatPills();buildRemPills();
  document.getElementById('f-title').oninput=function(){
    const rule=matchRule(this.value);
    if(rule){selCat=rule.cat;selRems=rule.rems;if(rule.note&&!document.getElementById('f-note').value)document.getElementById('f-note').value=rule.note;buildCatPills();buildRemPills();}
  };
  document.getElementById('add-modal').style.display='flex';
  setTimeout(()=>document.getElementById('f-title').focus(),120);
}
function closeAdd(){document.getElementById('add-modal').style.display='none';editId=null;}
function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('⚠️ 請填寫事件名稱');return;}
  const ev={id:editId||Date.now(),title,date:document.getElementById('f-date').value||null,time:document.getElementById('f-time').value||null,cat:selCat,rems:selRems,note:document.getElementById('f-note').value.trim(),done:editId?(events.find(e=>e.id===editId)?.done||false):false};
  if(editId)events=events.map(e=>e.id===editId?ev:e);else events.unshift(ev);
  saveEv();closeAdd();render();toast('✅ 已儲存！');
}

// ABSENCE MODAL
// ═══════════════════════════
function openAbsModal(type, editId_=null){
  editAbsId=editId_;
  const existing=editId_?absences.find(a=>a.id===editId_):null;
  const t=existing?existing.type:type;
  const isS=t==='student';

  document.getElementById('abs-modal-inner').innerHTML=`
    <div class="modal-title">
      <span>${isS?'🎒 學生請假':'👩‍🏫 老師請假'}</span>
      <button class="modal-close" onclick="closeAbsModal()">×</button>
    </div>
    <div class="field">
      <label>${isS?'👤 學生姓名':'👩‍🏫 老師姓名'}</label>
      <input id="ab-name" placeholder="${isS?'例如：小明、B班全體':'例如：Rita 老師'}" value="${existing?.name||''}"/>
    </div>
    <div class="field-row">
      <div class="field"><label>📅 請假日期</label><input id="ab-date" type="date" value="${existing?.date||isoToday()}"/></div>
      <div class="field"><label>📅 至（選填）</label><input id="ab-date2" type="date" value="${existing?.date2||''}"/></div>
    </div>
    <div class="field"><label>📝 請假原因</label><input id="ab-reason" placeholder="例如：生病、家事" value="${existing?.reason||''}"/></div>

    ${isS?`
    <div class="abs-form-section student-section">
      <div class="abs-section-title student">📚 補課安排</div>
      <div class="field" style="margin-bottom:10px">
        <label>待補進度 / 課程內容</label>
        <textarea id="ab-makeup" placeholder="例如：Unit 3 Vocab + p.24-26 練習題、上週的聽力作業…">${existing?.makeup||''}</textarea>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>預計補課日期（選填）</label>
        <input id="ab-makeup-date" type="date" value="${existing?.makeupDate||''}"/>
      </div>
    </div>`:`
    <div class="abs-form-section teacher-section">
      <div class="abs-section-title teacher">👤 代課安排</div>
      <div class="field" style="margin-bottom:10px">
        <label>代課老師</label>
        <input id="ab-sub" placeholder="例如：Polly 老師、請 Winnie 代" value="${existing?.sub||''}"/>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>代課內容 / 交接事項</label>
        <textarea id="ab-subplan" placeholder="例如：B班繼續 Unit 5，請按照教案進行，CD在抽屜…">${existing?.subplan||''}</textarea>
      </div>
    </div>`}

    <div class="field">
      <label>📝 其他備注</label>
      <textarea id="ab-note" placeholder="其他需要記錄的事項…">${existing?.note||''}</textarea>
    </div>
    <button class="save-btn ${isS?'purple-btn':'red-btn'}" onclick="saveAbsence('${t}')">💾 儲存請假紀錄</button>
  `;
  document.getElementById('abs-modal').style.display='flex';
}
function closeAbsModal(){document.getElementById('abs-modal').style.display='none';editAbsId=null;}

function saveAbsence(type){
  const name=(document.getElementById('ab-name')?.value||'').trim();
  const date=document.getElementById('ab-date')?.value;
  if(!name){toast('⚠️ 請填寫姓名');return;}
  if(!date){toast('⚠️ 請填寫日期');return;}
  const isS=type==='student';
  const rec={
    id:editAbsId||Date.now(),
    type,name,date,
    date2:document.getElementById('ab-date2')?.value||null,
    reason:document.getElementById('ab-reason')?.value||'',
    note:document.getElementById('ab-note')?.value||'',
    ...(isS?{
      makeup:document.getElementById('ab-makeup')?.value||'',
      makeupDate:document.getElementById('ab-makeup-date')?.value||null,
      makeupDone:editAbsId?(absences.find(a=>a.id===editAbsId)?.makeupDone||false):false,
    }:{
      sub:document.getElementById('ab-sub')?.value||'',
      subplan:document.getElementById('ab-subplan')?.value||'',
      subConfirmed:editAbsId?(absences.find(a=>a.id===editAbsId)?.subConfirmed||false):false,
    }),
  };
  if(editAbsId)absences=absences.map(a=>a.id===editAbsId?rec:a);
  else absences.unshift(rec);
  saveAbs();closeAbsModal();render();
  toast(isS?'🎒 學生請假已記錄！':'👩‍🏫 老師請假已記錄！');
}

// ═══════════════════════════
// UPLOAD / AI
// ═══════════════════════════
function openUpload(){document.getElementById('upload-modal').style.display='flex';resetUploadBody();}
function closeUpload(){document.getElementById('upload-modal').style.display='none';}
function resetUploadBody(){
  document.getElementById('upload-body').innerHTML=`
    <div class="upload-zone"><input type="file" id="file-input" accept="image/*,.pdf,.txt,.csv,.xlsx,.docx" onchange="handleFile(this.files[0])"/>
    <span style="font-size:36px;display:block;margin-bottom:8px">📎</span>
    <div class="upload-hint">拖曳或點擊上傳<br><span style="font-size:11px;color:var(--hint)">圖片 / PDF / Excel / Word / 純文字</span></div></div>`;
}
function saveKey(){
  const k=document.getElementById('api-key').value.trim();if(!k)return;
  localStorage.setItem('wc4_apikey',k);document.getElementById('api-key').value='';
  document.getElementById('key-status').textContent='✅ 已儲存';document.getElementById('api-key').placeholder='API Key 已儲存';
}
(function(){const k=localStorage.getItem('wc4_apikey');if(k){document.getElementById('key-status').textContent='✅';document.getElementById('api-key').placeholder='API Key 已儲存';}})();

const EXTRACT_PROMPT=`你是行事曆事件擷取助手。找出所有有日期的事件。分類：meeting=親師座談/PTA/說明會，deadline=截止/考試/評量，event=活動/比賽，work=會議，other=其他。提醒：meeting=[7,1]，deadline=[7,3,1]，event=[3,1]，work=[1]，other=[0]。今年${today.getFullYear()}年。只回傳JSON：{"events":[{"title":"","date":"YYYY-MM-DD","time":"HH:MM或null","category":"","note":"","rems":[]}]}`;

async function handleFile(file){
  const key=localStorage.getItem('wc4_apikey');
  if(!key){toast('⚠️ 請先輸入 API Key');return;}
  document.getElementById('upload-body').innerHTML=`<div style="text-align:center;padding:28px"><div class="spinner"></div><p style="font-size:13px;color:var(--muted);font-weight:600">🤖 分析中…</p></div>`;
  try{
    let messages;
    if(file.type.startsWith('image/')||file.type==='application/pdf'){
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      messages=[{role:'user',content:[{type:file.type.startsWith('image/')?'image':'document',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:EXTRACT_PROMPT}]}];
    }else{messages=[{role:'user',content:`${EXTRACT_PROMPT}\n\n${(await file.text()).slice(0,8000)}`}];}
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2000,messages})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const parsed=JSON.parse(data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim());
    showAIResults(parsed.events||[]);
  }catch(e){
    document.getElementById('upload-body').innerHTML=`<p style="color:var(--red);font-size:13px;text-align:center;padding:12px;font-weight:700">❌ ${e.message}</p>`;
    setTimeout(resetUploadBody,2500);
  }
}

window._aiEvs=[];
function showAIResults(evs){
  if(!evs.length){document.getElementById('upload-body').innerHTML=`<div class="empty"><span class="empty-art">🔍</span><div class="empty-msg">沒有找到事件</div></div>`;setTimeout(resetUploadBody,2000);return;}
  window._aiEvs=evs;
  evs.forEach(ev=>{const rule=matchRule(ev.title);if(rule){ev.category=rule.cat;ev.rems=rule.rems;if(rule.note&&!ev.note)ev.note=rule.note;}});
  let html=`<div class="smart-banner">⚡ 找到 ${evs.length} 個事件，已套用規則！</div>`;
  html+=evs.map((ev,i)=>{const c=CATS[ev.category]||CATS.other;return`<div class="ai-ev-item"><input type="checkbox" class="ai-ev-check" id="aiev${i}" checked/><div><div style="font-size:13px;font-weight:700">${c.icon} ${ev.title}</div><div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:2px">${ev.date||''}${ev.time&&ev.time!='null'?' '+ev.time:''} · <span style="color:${c.color}">${c.label}</span>${ev.rems?' · 🔔 '+ev.rems.map(r=>r===0?'當天':r+'天前').join('、'):''}</div>${ev.note?`<div style="font-size:11px;color:var(--muted);font-style:italic">📝 ${ev.note}</div>`:''}</div></div>`;}).join('');
  html+=`<button class="save-btn" style="margin-top:14px" onclick="importAI()">✨ 匯入勾選的事件</button>`;
  document.getElementById('upload-body').innerHTML=html;
}
function importAI(){
  (window._aiEvs||[]).forEach((ev,i)=>{
    const cb=document.getElementById('aiev'+i);if(!cb||!cb.checked)return;
    events.unshift({id:Date.now()+i,title:ev.title,date:ev.date||null,time:(ev.time&&ev.time!=='null')?ev.time:null,cat:ev.category||'other',rems:ev.rems||[0],note:ev.note||'',done:false});
  });
  saveEv();closeUpload();render();toast('✅ 事件已匯入！');
}

// NOTIFICATIONS
function checkNotifications(){
  if(!('Notification'in window))return;
  if(Notification.permission==='default')Notification.requestPermission();
  if(Notification.permission!=='granted')return;
  events.forEach(ev=>{
    if(!ev.date||ev.done)return;
    const diff=Math.round((new Date(ev.date+'T00:00:00')-today)/864e5);
    if((ev.rems||[]).includes(diff)){
      const key=`notif_${ev.id}_${diff}`;
      if(!sessionStorage.getItem(key)){
        new Notification('🌸 WorkCal',{body:diff===0?`今天：${ev.title}`:diff===1?`明天：${ev.title}`:`${diff}天後：${ev.title}`});
        sessionStorage.setItem(key,'1');
      }
    }
  });
  // absence reminders
  absences.forEach(a=>{
    if(a.type==='student'&&!a.makeupDone&&a.makeup){
      const key=`abs_notif_${a.id}`;
      if(!sessionStorage.getItem(key)){
        new Notification('🎒 WorkCal 補課提醒',{body:`${a.name} 的補課待安排：${a.makeup.slice(0,40)}`});
        sessionStorage.setItem(key,'1');
      }
    }
  });
}

// INIT
render();
